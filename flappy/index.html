<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAPX</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0d1a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    user-select: none;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── Canvas Setup ──────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
 
const W = 400, H = 600;
canvas.width = W;
canvas.height = H;
 
// Scale canvas to fit viewport while maintaining aspect ratio
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width  = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
resize();
window.addEventListener('resize', resize);
 
// ─── Audio (Web Audio API) ─────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
}
 
function playFlap() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}
 
function playScore() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(880, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
  osc.start(); osc.stop(audioCtx.currentTime + 0.18);
}
 
function playDeath() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(400, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.4);
  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
  osc.start(); osc.stop(audioCtx.currentTime + 0.45);
}
 
// ─── Constants ─────────────────────────────────────────────────────────────
const GRAVITY        = 1800;  // px/s²
const FLAP_VEL       = -460;  // px/s (negative = up)
const PIPE_WIDTH     = 52;
const PIPE_GAP       = 155;   // vertical gap between top/bottom pipe
const BASE_PIPE_SPD  = 180;   // px/s at score 0
const BASE_SPAWN_INT = 1.8;   // seconds between pipes at score 0
const GROUND_H       = 60;
const BIRD_R         = 13;    // bird radius
 
// ─── State ─────────────────────────────────────────────────────────────────
let state = 'start'; // 'start' | 'play' | 'dead'
let score = 0, best = 0;
try { best = parseInt(localStorage.getItem('flapx_best') || '0'); } catch(e) {}
 
// Bird
let bird = { x: 90, y: H/2, vy: 0, angle: 0 };
 
// Pipes: [{x, gapY, scored}]  gapY = center of gap
let pipes = [];
let pipeTimer = 0;
 
// Particles: [{x,y,vx,vy,life,maxLife,r,hue}]
let particles = [];
 
// Screen effects
let flashAlpha = 0;      // red flash
let shakeTime  = 0;      // screen shake duration
let shakeMag   = 8;      // shake magnitude
 
// Parallax layers
// Layer 0: far stars (slow)   Layer 1: near shapes (medium)
let stars = [];
let clouds = [];
 
// ─── Init helpers ──────────────────────────────────────────────────────────
function initParallax() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * (H - GROUND_H),
      r: Math.random() * 1.4 + 0.3,
      spd: 18 + Math.random() * 12,  // slow layer
      alpha: 0.3 + Math.random() * 0.55
    });
  }
  clouds = [];
  for (let i = 0; i < 8; i++) {
    clouds.push(makeCloud(Math.random() * W));
  }
}
 
function makeCloud(x) {
  return {
    x,
    y: 40 + Math.random() * (H * 0.5),
    w: 50 + Math.random() * 70,
    h: 12 + Math.random() * 18,
    spd: 50 + Math.random() * 30,   // mid layer
    alpha: 0.06 + Math.random() * 0.07
  };
}
 
function resetGame() {
  bird = { x: 90, y: H/2, vy: 0, angle: 0 };
  pipes = [];
  pipeTimer = 0;
  particles = [];
  flashAlpha = 0;
  shakeTime  = 0;
  score = 0;
}
 
// ─── Difficulty ─────────────────────────────────────────────────────────────
function pipeSpeed()    { return BASE_PIPE_SPD  + score * 4.5; }
function spawnInterval(){ return Math.max(0.9, BASE_SPAWN_INT - score * 0.022); }
 
// ─── Pipe helpers ──────────────────────────────────────────────────────────
function spawnPipe() {
  const minGapCenter = 120;
  const maxGapCenter = H - GROUND_H - 120;
  const gapY = minGapCenter + Math.random() * (maxGapCenter - minGapCenter);
  pipes.push({ x: W + PIPE_WIDTH, gapY, scored: false });
}
 
// ─── Collision ─────────────────────────────────────────────────────────────
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const nearX = Math.max(rx, Math.min(cx, rx + rw));
  const nearY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nearX, dy = cy - nearY;
  return dx*dx + dy*dy < cr*cr;
}
 
function checkCollision() {
  // Ground and ceiling
  if (bird.y - BIRD_R <= 0 || bird.y + BIRD_R >= H - GROUND_H) return true;
  // Pipes
  for (const p of pipes) {
    const topH   = p.gapY - PIPE_GAP/2;
    const botY   = p.gapY + PIPE_GAP/2;
    const botH   = H - GROUND_H - botY;
    if (
      circleRect(bird.x, bird.y, BIRD_R-2, p.x, 0,    PIPE_WIDTH, topH) ||
      circleRect(bird.x, bird.y, BIRD_R-2, p.x, botY,  PIPE_WIDTH, botH)
    ) return true;
  }
  return false;
}
 
// ─── Particles ─────────────────────────────────────────────────────────────
function spawnDeathParticles() {
  for (let i = 0; i < 32; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = 80 + Math.random() * 260;
    particles.push({
      x: bird.x, y: bird.y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 60,
      life: 0.5 + Math.random() * 0.5,
      maxLife: 0.5 + Math.random() * 0.5,
      r: 2 + Math.random() * 4,
      hue: 30 + Math.random() * 40   // gold/orange burst
    });
  }
}
 
// ─── Input ─────────────────────────────────────────────────────────────────
function onInput() {
  ensureAudio();
  if (state === 'start') {
    state = 'play';
    resetGame();
    flap();
  } else if (state === 'play') {
    flap();
  } else if (state === 'dead') {
    state = 'play';
    resetGame();
    flap();
  }
}
 
function flap() {
  bird.vy = FLAP_VEL;
  playFlap();
}
 
window.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'Enter') { e.preventDefault(); onInput(); }});
canvas.addEventListener('pointerdown', e => { e.preventDefault(); onInput(); });
 
// ─── Update ─────────────────────────────────────────────────────────────────
let lastTime = null;
 
function update(dt) {
  // Parallax always scrolls
  const spd = state === 'play' ? pipeSpeed() : BASE_PIPE_SPD;
  for (const s of stars)  { s.x -= s.spd  * dt; if (s.x < -2)   s.x = W + 2; }
  for (const c of clouds) { c.x -= c.spd  * dt; if (c.x < -c.w) c.x = W + c.w; }
 
  // Screen effects (run in all states so shake/flash taper after death)
  if (flashAlpha > 0) flashAlpha -= dt * 3;
  if (shakeTime  > 0) shakeTime  -= dt;
 
  if (state !== 'play') return;
 
  // Bird physics
  bird.vy += GRAVITY * dt;
  bird.y  += bird.vy * dt;
 
  // Bird rotation: tilt up on flap, nose down when falling
  const targetAngle = Math.min(Math.max(bird.vy / 600, -0.45), 0.9) * (Math.PI / 2);
  bird.angle += (targetAngle - bird.angle) * Math.min(1, dt * 10);
 
  // Pipes
  pipeTimer -= dt;
  if (pipeTimer <= 0) { spawnPipe(); pipeTimer = spawnInterval(); }
 
  for (const p of pipes) {
    p.x -= spd * dt;
    // Score
    if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
      p.scored = true;
      score++;
      playScore();
    }
  }
  // Remove off-screen pipes
  pipes = pipes.filter(p => p.x + PIPE_WIDTH > -10);
 
  // Particles
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 400 * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
 
  // Collision
  if (checkCollision()) {
    state = 'dead';
    if (score > best) {
      best = score;
      try { localStorage.setItem('flapx_best', best); } catch(e) {}
    }
    spawnDeathParticles();
    flashAlpha = 1;
    shakeTime  = 1.0;
    playDeath();
  }
}
 
// ─── Draw ───────────────────────────────────────────────────────────────────
 
// Color palette
const COL = {
  bg:        '#08091a',
  ground:    '#111827',
  groundTop: '#1e2a3a',
  pipeBody:  '#1a2540',
  pipeCap:   '#243050',
  pipeEdge:  '#2e3d60',
  bird:      '#f5c842',
  birdEye:   '#1a1a2e',
  birdWing:  '#e8a820',
  scoreText: '#ffffff',
};
 
function drawBackground() {
  // Sky gradient (flat dark)
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, W, H);
 
  // Stars
  for (const s of stars) {
    ctx.save();
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = '#cde';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
 
  // Clouds (distant shapes)
  for (const c of clouds) {
    ctx.save();
    ctx.globalAlpha = c.alpha;
    ctx.fillStyle = '#8ab4d0';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w/2, c.h/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}
 
function drawGround() {
  ctx.fillStyle = COL.ground;
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  // top edge highlight
  ctx.fillStyle = COL.groundTop;
  ctx.fillRect(0, H - GROUND_H, W, 4);
  // subtle grid lines
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#4a6080';
  ctx.lineWidth = 1;
  const lineSpd = state === 'play' ? pipeSpeed() : BASE_PIPE_SPD;
  for (let i = 0; i < W; i += 30) {
    ctx.beginPath();
    ctx.moveTo(i, H - GROUND_H + 4);
    ctx.lineTo(i, H);
    ctx.stroke();
  }
  ctx.restore();
}
 
function drawPipe(p) {
  const topH = p.gapY - PIPE_GAP/2;
  const botY = p.gapY + PIPE_GAP/2;
  const botH = H - GROUND_H - botY;
  const capW = PIPE_WIDTH + 8;
  const capH = 16;
  const cx   = p.x - 4; // cap offset (centered)
 
  // Helper: draw one pipe section
  function section(px, py, pw, ph) {
    // body
    ctx.fillStyle = COL.pipeBody;
    ctx.fillRect(px, py, pw, ph);
    // left edge highlight
    ctx.fillStyle = COL.pipeEdge;
    ctx.fillRect(px, py, 3, ph);
    // right shadow
    ctx.fillStyle = '#0e1830';
    ctx.fillRect(px + pw - 3, py, 3, ph);
  }
 
  // Top pipe
  section(p.x, 0, PIPE_WIDTH, topH);
  // Top cap
  ctx.fillStyle = COL.pipeCap;
  ctx.fillRect(cx, topH - capH, capW, capH);
  ctx.fillStyle = COL.pipeEdge;
  ctx.fillRect(cx, topH - capH, 3, capH);
  ctx.fillStyle = '#0e1830';
  ctx.fillRect(cx + capW - 3, topH - capH, 3, capH);
 
  // Bottom pipe
  section(p.x, botY, PIPE_WIDTH, botH);
  // Bottom cap
  ctx.fillStyle = COL.pipeCap;
  ctx.fillRect(cx, botY, capW, capH);
  ctx.fillStyle = COL.pipeEdge;
  ctx.fillRect(cx, botY, 3, capH);
  ctx.fillStyle = '#0e1830';
  ctx.fillRect(cx + capW - 3, botY, 3, capH);
}
 
function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(bird.angle);
 
  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, BIRD_R + 4, BIRD_R * 0.8, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
 
  // Body
  ctx.fillStyle = COL.bird;
  ctx.beginPath();
  ctx.arc(0, 0, BIRD_R, 0, Math.PI*2);
  ctx.fill();
 
  // Wing
  ctx.fillStyle = COL.birdWing;
  ctx.beginPath();
  ctx.ellipse(-4, 2, 8, 5, -0.4, 0, Math.PI*2);
  ctx.fill();
 
  // Eye white
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(5, -4, 5, 0, Math.PI*2);
  ctx.fill();
 
  // Pupil
  ctx.fillStyle = COL.birdEye;
  ctx.beginPath();
  ctx.arc(6.5, -4, 2.5, 0, Math.PI*2);
  ctx.fill();
 
  // Beak (flipped 180°)
  ctx.fillStyle = '#e07820';
  ctx.beginPath();
  ctx.moveTo(BIRD_R, 0);
  ctx.lineTo(BIRD_R + 9,  2);
  ctx.lineTo(BIRD_R + 9, -3);
  ctx.closePath();
  ctx.fill();
 
  ctx.restore();
}
 
function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = t * 0.9;
    ctx.fillStyle = `hsl(${p.hue}, 90%, 65%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * t, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}
 
function drawScore() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 46px -apple-system, sans-serif';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 8;
  ctx.fillText(score, W/2, 80);
  ctx.restore();
}
 
function drawStartScreen() {
  // Title
  ctx.save();
  ctx.textAlign = 'center';
 
  // Glow ring behind title
  ctx.fillStyle = 'rgba(245, 200, 66, 0.07)';
  ctx.beginPath();
  ctx.arc(W/2, H*0.38, 70, 0, Math.PI*2);
  ctx.fill();
 
  ctx.fillStyle = '#f5c842';
  ctx.font = 'bold 52px -apple-system, sans-serif';
  ctx.shadowColor = 'rgba(245,200,66,0.4)';
  ctx.shadowBlur = 20;
  ctx.fillText('FLAPX', W/2, H*0.38);
 
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '16px -apple-system, sans-serif';
  ctx.fillText('TAP  •  CLICK  •  SPACE', W/2, H*0.38 + 44);
 
  if (best > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '14px -apple-system, sans-serif';
    ctx.fillText(`best: ${best}`, W/2, H*0.38 + 74);
  }
  ctx.restore();
}
 
function drawDeathScreen() {
  // Dark overlay
  ctx.fillStyle = 'rgba(8, 9, 26, 0.72)';
  ctx.fillRect(0, 0, W, H);
 
  // Card
  const cw = 280, ch = 180;
  const cx = (W - cw) / 2, cy = (H - ch) / 2 - 20;
  ctx.fillStyle = 'rgba(20, 28, 55, 0.95)';
  roundRect(ctx, cx, cy, cw, ch, 16);
  ctx.fill();
  ctx.strokeStyle = 'rgba(80, 110, 200, 0.3)';
  ctx.lineWidth = 1;
  roundRect(ctx, cx, cy, cw, ch, 16);
  ctx.stroke();
 
  ctx.save();
  ctx.textAlign = 'center';
 
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '13px -apple-system, sans-serif';
  ctx.fillText('SCORE', W/2 - 60, cy + 42);
  ctx.fillText('BEST', W/2 + 60, cy + 42);
 
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 38px -apple-system, sans-serif';
  ctx.fillText(score, W/2 - 60, cy + 88);
 
  ctx.fillStyle = score >= best ? '#f5c842' : '#7ba3ff';
  ctx.font = 'bold 38px -apple-system, sans-serif';
  ctx.fillText(best, W/2 + 60, cy + 88);
 
  // divider
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(cx + 20, cy + 100, cw - 40, 1);
 
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '15px -apple-system, sans-serif';
  ctx.fillText('tap to restart', W/2, cy + 138);
 
  ctx.restore();
}
 
function drawFlash() {
  if (flashAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = flashAlpha * 0.55;
  ctx.fillStyle = '#ff1a2e';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}
 
// Utility: rounded rect path
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
 
// ─── Game Loop ──────────────────────────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  if (lastTime === null) { lastTime = ts; initParallax(); }
  const dt = Math.min((ts - lastTime) / 1000, 0.05); // cap at 50ms
  lastTime = ts;
 
  update(dt);
 
  // Screen shake transform
  let sx = 0, sy = 0;
  if (shakeTime > 0) {
    const mag = shakeMag * (shakeTime / 1.0);
    sx = (Math.random() - 0.5) * mag * 2;
    sy = (Math.random() - 0.5) * mag * 2;
  }
  ctx.save();
  ctx.translate(sx, sy);
 
  // Draw layers
  drawBackground();
  for (const p of pipes) drawPipe(p);
  drawGround();
  drawBird();
  drawParticles();
  if (state === 'play') drawScore();
  drawFlash();
  if (state === 'start') drawStartScreen();
  if (state === 'dead')  drawDeathScreen();
 
  ctx.restore();
}
 
requestAnimationFrame(loop);
</script>
</body>
</html>
