
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&family=Cinzel:wght@600&family=VT323&family=Orbitron:wght@700&family=Permanent+Marker&family=Audiowide&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;flex-direction:column;align-items:center;padding:12px 8px;min-height:100vh;transition:background .4s;overflow:hidden}
#bg-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:0}
#explosion-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:999}
#tile-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:10}
#game-root{width:100%;max-width:100%;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
.theme-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:8px;width:100%;max-width:620px}
.tbtn{padding:4px 3px;border:1px solid #444;background:transparent;color:#888;font-size:9px;cursor:pointer;border-radius:4px;transition:all .2s;letter-spacing:1px;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.diff-row{display:flex;gap:5px;margin-bottom:8px;width:100%;max-width:620px}
.dbtn{flex:1;padding:4px 5px;border:1px solid #333;background:transparent;color:#666;font-family:monospace;font-size:10px;cursor:pointer;border-radius:4px}
.panel{border:1px solid #333;border-radius:8px;padding:8px 14px;margin-bottom:8px;display:flex;align-items:center;gap:16px;width:100%;max-width:620px}
.stat{display:flex;flex-direction:column;align-items:center;min-width:48px}
.stat-label{font-size:10px;letter-spacing:2px}
.stat-val{font-size:20px;font-weight:700}
.reset-btn{flex:1;padding:6px;border:1px solid #555;background:transparent;font-size:18px;cursor:pointer;border-radius:6px}
#music-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:5px 10px;border:1px solid #333;border-radius:6px;width:100%;max-width:620px}
#music-btn{padding:3px 10px;border:1px solid #555;background:transparent;font-size:11px;cursor:pointer;border-radius:4px;letter-spacing:1px;font-family:monospace;white-space:nowrap}
#music-label{font-size:10px;letter-spacing:2px;flex:1;text-align:center}
#vol-slider{width:60px;accent-color:#888}
#grid-wrap{width:100%;display:flex;justify-content:center;align-items:center}
#grid{display:grid;margin:0 auto;cursor:default}
.cell{border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;user-select:none;transition:transform .08s}
.cell:hover:not(.revealed):not(.flagged){transform:scale(1.08)}
.cell.revealed{cursor:default}
.cell.flagged::after{content:'!';font-weight:900}
.cell.mine-show::after{content:'*';font-weight:900}
@keyframes cellPop{0%{transform:scale(1)}35%{transform:scale(1.2)}65%{transform:scale(0.93)}100%{transform:scale(1)}}
@keyframes cellRippleAnim{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
.cell.pop{animation:cellPop .2s ease-out forwards}
.cell.win-ripple{animation:cellRippleAnim .28s ease-out forwards}
#end-area{width:100%;max-width:620px}
.end-overlay{display:flex;min-height:200px;align-items:center;justify-content:center;margin-top:8px}
.end-box{border:1px solid #555;border-radius:12px;padding:22px 32px;text-align:center}
.end-box h2{font-size:26px;letter-spacing:4px;margin-bottom:6px}
.end-box p{font-size:12px;margin-bottom:14px}
.end-box button{padding:8px 22px;background:transparent;border:1px solid currentColor;font-size:12px;cursor:pointer;border-radius:6px;letter-spacing:2px;font-family:monospace}
.mode-row{display:flex;gap:5px;margin-bottom:8px;width:100%;max-width:620px}
.mbtn{flex:1;padding:4px 5px;border:1px solid #333;background:transparent;color:#666;font-family:monospace;font-size:10px;cursor:pointer;border-radius:4px;letter-spacing:1px}
.mbtn.active{font-weight:700}
#timebomb-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:5px 10px;border:1px solid #333;border-radius:6px;width:100%;max-width:620px;display:none}
#timebomb-row span{font-size:10px;letter-spacing:2px;flex:1}
#tb-minus,#tb-plus{width:24px;height:24px;border:1px solid #555;background:transparent;color:#888;font-size:14px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;line-height:1}
#tb-val{font-size:13px;font-weight:700;min-width:38px;text-align:center}
#tb-countdown{font-size:13px;font-weight:700;min-width:48px;text-align:right}
#lives-bar{position:fixed;bottom:12px;right:12px;z-index:20;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
#lives-toggle{padding:4px 10px;border:1px solid #444;background:transparent;color:#666;font-size:9px;cursor:pointer;border-radius:4px;font-family:monospace;letter-spacing:1px}
#hearts-display{font-size:20px;letter-spacing:3px;display:none}
</style>
<canvas id="bg-canvas"></canvas>
<canvas id="explosion-canvas"></canvas>
<canvas id="tile-canvas"></canvas>
<div id="game-root">
  <div style="text-align:center;margin-bottom:4px">
    <div id="game-title" style="font-size:22px;font-weight:700;letter-spacing:5px"></div>
    <div id="game-sub" style="font-size:10px;letter-spacing:3px;margin-bottom:10px"></div>
  </div>
  <div class="theme-bar" id="theme-bar"></div>
  <div class="mode-row" id="mode-row"></div>
  <div id="timebomb-row">
    <span id="tb-label">⏱ time</span>
    <button id="tb-minus" onclick="adjustTB(-10)">−</button>
    <div id="tb-val">2:00</div>
    <button id="tb-plus" onclick="adjustTB(10)">+</button>
    <div id="tb-countdown"></div>
  </div>
  <div class="diff-row" id="diff-row"></div>
  <div class="panel" id="panel">
    <div class="stat"><div class="stat-label" id="mine-label">mines</div><div class="stat-val" id="mine-count">10</div></div>
    <button class="reset-btn" id="reset-btn" onclick="newGame()">◉</button>
    <div class="stat"><div class="stat-label" id="time-label">time</div><div class="stat-val" id="timer">000</div></div>
  </div>
  <div id="music-bar">
    <button id="music-btn" onclick="toggleMusic()">▶ music</button>
    <span id="music-label">♩ no track</span>
    <input id="vol-slider" type="range" min="0" max="100" value="40" step="1" oninput="setMusicVol(this.value)">
  </div>
  <div id="grid-wrap"><div id="grid"></div></div>
  <div id="end-area"></div>
</div>
<div id="lives-bar">
  <div id="hearts-display"></div>
  <button id="lives-toggle" onclick="toggleLives()">♥ lives off</button>
</div>

function getSfxAC(){if(!sfxAC)sfxAC=new(window.AudioContext||window.webkitAudioContext)();return sfxAC;}

function syncCanvases(){const W=window.innerWidth,H=window.innerHeight;bgCanvas.width=W;bgCanvas.height=H;bgCanvas.style.width=W+'px';bgCanvas.style.height=H+'px';exCanvas.width=W;exCanvas.height=H;tileCanvas.width=W;tileCanvas.height=H;}

function screenShake(intensity,duration){const root=document.getElementById('game-root');const start=performance.now();function frame(now){const t=(now-start)/duration;if(t>=1){root.style.transform='translate(0,0)';return;}const s=intensity*(1-t);root.style.transform=`translate(${(Math.random()-.5)*2*s}px,${(Math.random()-.5)*2*s}px)`;requestAnimationFrame(frame);}requestAnimationFrame(frame);}
function computeCellSize(){const gw=document.getElementById('grid-wrap');gw.style.display='none';const ch=document.getElementById('game-root').offsetHeight+24;gw.style.display='flex';const aW=window.innerWidth-20,aH=window.innerHeight-ch;cellSize=Math.max(8,Math.min(34,Math.floor((aW+2)/(cols+0.07)),Math.floor((aH+2)/(rows+0.07))));}
function neighbors(idx){const r=Math.floor(idx/cols),c=idx%cols,res=[];for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){if(!dr&&!dc)continue;const nr=r+dr,nc=c+dc;if(nr>=0&&nr<rows&&nc>=0&&nc<cols)res.push(nr*cols+nc);}return res;}
function calcNumbers(b){for(let i=0;i<rows*cols;i++){if(b[i]===9)continue;b[i]=neighbors(i).filter(j=>b[j]===9).length;}}
function isSolvable(b,si){const rev=Array(rows*cols).fill(false),flg=Array(rows*cols).fill(false);const sz=new Set([si,...neighbors(si)]);sz.forEach(i=>{if(b[i]!==9)rev[i]=true;});const q=[];sz.forEach(i=>{if(b[i]===0&&b[i]!==9)q.push(i);});while(q.length){const c=q.shift();neighbors(c).forEach(j=>{if(!rev[j]&&b[j]!==9){rev[j]=true;if(b[j]===0)q.push(j);}});}let changed=true;while(changed){changed=false;for(let i=0;i<rows*cols;i++){if(!rev[i]||b[i]===9||b[i]===0)continue;const nb=neighbors(i),hid=nb.filter(j=>!rev[j]&&!flg[j]),fc=nb.filter(j=>flg[j]).length,rem=b[i]-fc;if(rem===0&&hid.length){hid.forEach(j=>{rev[j]=true;if(b[j]===0){const q2=[j];while(q2.length){const c=q2.shift();neighbors(c).forEach(k=>{if(!rev[k]&&b[k]!==9){rev[k]=true;if(b[k]===0)q2.push(k);}});}}});changed=true;}else if(rem===hid.length&&hid.length){hid.forEach(j=>{if(!flg[j]){flg[j]=true;changed=true;}});}}}for(let i=0;i<rows*cols;i++){if(b[i]!==9&&!rev[i]&&!flg[i])return false;}return true;}
function generateNoGuessBoard(si){const safe=new Set([si,...neighbors(si)]),cands=[];for(let i=0;i<rows*cols;i++){if(!safe.has(i))cands.push(i);}for(let a=0;a<2000;a++){for(let i=cands.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cands[i],cands[j]]=[cands[j],cands[i]];}const b=Array(rows*cols).fill(0);cands.slice(0,mineCount).forEach(i=>{b[i]=9;});calcNumbers(b);if(isSolvable(b,si))return b;}const b=Array(rows*cols).fill(0),c2=[...cands];for(let i=c2.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c2[i],c2[j]]=[c2[j],c2[i]];}c2.slice(0,mineCount).forEach(i=>{b[i]=9;});calcNumbers(b);return b;}
function applyThemeStyles(){const T=THEMES[curTheme];document.body.style.background=T.bg;document.body.style.fontFamily=T.font;document.getElementById('panel').style.cssText=T.panelStyle;['mine-label','time-label'].forEach(id=>document.getElementById(id).style.color=T.statLabelColor);['mine-count','timer'].forEach(id=>document.getElementById(id).style.color=T.statValColor);document.getElementById('reset-btn').style.cssText=T.resetStyle+';font-family:'+T.font+';background:transparent';document.getElementById('game-title').style.cssText=`font-family:${T.titleFont};color:${T.titleColor};font-size:22px;font-weight:700;letter-spacing:5px`;document.getElementById('game-title').textContent=T.titleText;document.getElementById('game-sub').style.cssText=`color:${T.accent2};font-size:10px;letter-spacing:3px;margin-bottom:10px`;document.getElementById('game-sub').textContent=T.subtitleText;document.querySelectorAll('.tbtn').forEach(b=>{const a=b.dataset.theme===curTheme;b.style.cssText=T.btnStyle(a)+';font-family:'+T.font;});document.querySelectorAll('.dbtn').forEach(b=>{b.style.borderColor=T.border;b.style.color=T.accent2;b.style.fontFamily=T.font;});document.querySelectorAll('.mbtn').forEach(b=>{const a=b.dataset.mode===curMode;b.style.cssText=`border-color:${a?T.accent:T.border};color:${a?T.accent:T.accent2};font-family:${T.font};background:${a?T.panel:'transparent'}`});const tbr=document.getElementById('timebomb-row');tbr.style.cssText=`display:${curMode==='timebomb'?'flex':'none'};align-items:center;gap:8px;margin-bottom:8px;padding:5px 10px;border:1px solid ${T.border};border-radius:6px;width:100%;max-width:620px`;document.getElementById('tb-label').style.color=T.accent;document.getElementById('tb-val').style.color=T.accent2;document.getElementById('tb-countdown').style.color=T.accent;['tb-minus','tb-plus'].forEach(id=>{const el=document.getElementById(id);el.style.borderColor=T.border;el.style.color=T.accent2;});updateTBDisplay();const lt=document.getElementById('lives-toggle');lt.style.cssText=`padding:4px 10px;border:1px solid ${livesMode?T.accent:T.border};background:transparent;color:${livesMode?T.accent:T.accent2};font-size:9px;cursor:pointer;border-radius:4px;font-family:${T.font};letter-spacing:1px`;lt.textContent=livesMode?'♥ lives on':'♥ lives off';updateHeartsDisplay();updateMusicBar();}
function buildUI(){Object.keys(THEMES).forEach(k=>{const b=document.createElement('button');b.className='tbtn'+(k===curTheme?' active':'');b.dataset.theme=k;b.textContent=THEMES[k].name;b.onclick=()=>{document.querySelectorAll('.tbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curTheme=k;applyThemeStyles();startBgAnim();if(musicPlaying){stopMusic();startMusic();}newGame();};document.getElementById('theme-bar').appendChild(b);});['easy 9x9','med 16x16','hard 30x16'].forEach((label,i)=>{const b=document.createElement('button');b.className='dbtn';b.textContent=label;b.onclick=()=>{diff=i;newGame();};document.getElementById('diff-row').appendChild(b);});[{mode:'classic',label:'CLASSIC'},{mode:'timebomb',label:'⏱ TIME BOMB'}].forEach(({mode,label})=>{const b=document.createElement('button');b.className='mbtn'+(mode===curMode?' active':'');b.dataset.mode=mode;b.textContent=label;b.onclick=()=>{curMode=mode;applyThemeStyles();newGame();};document.getElementById('mode-row').appendChild(b);});}
function newGame(){const D=DIFFS[diff];cols=D.cols;rows=D.rows;mineCount=D.mines;clearInterval(timerInt);clearInterval(tbInterval);tbInterval=null;tbRemaining=tbSeconds;seconds=0;chainTimeouts.forEach(t=>clearTimeout(t));chainTimeouts=[];document.getElementById('timer').textContent='000';document.getElementById('mine-count').textContent=mineCount;document.getElementById('reset-btn').textContent='◉';document.getElementById('end-area').innerHTML='';board=Array(rows*cols).fill(0);revealed=Array(rows*cols).fill(false);flagged=Array(rows*cols).fill(false);deadMines=[];livesLeft=livesMode?3:null;gameState='playing';firstClick=true;exParticles=[];tileParticles=[];if(exAnimId){cancelAnimationFrame(exAnimId);exAnimId=null;}if(tileAnimId){cancelAnimationFrame(tileAnimId);tileAnimId=null;}exCtx.clearRect(0,0,exCanvas.width,exCanvas.height);tileCtx.clearRect(0,0,tileCanvas.width,tileCanvas.height);updateTBDisplay();updateHeartsDisplay();computeCellSize();renderGrid();}
function styleCell(el,idx){const T=THEMES[curTheme],sz=cellSize;el.className='cell';el.style.fontFamily=T.font;el.textContent='';el.style.color='';el.style.width=sz+'px';el.style.height=sz+'px';el.style.fontSize=Math.max(8,Math.round(sz*0.45))+'px';if(revealed[idx]){el.classList.add('revealed');el.style.background=T.cellRevealed;el.style.border=`1px solid ${T.border}`;el.style.cursor='default';if(board[idx]===9){el.classList.add('mine-show');el.style.color=deadMines.includes(idx)?T.accent2:T.mineColor;el.style.fontSize=Math.max(8,Math.round(sz*0.5))+'px';}else if(board[idx]>0){el.textContent=board[idx];el.style.color=T.numColors[board[idx]-1];}el.onmouseenter=null;el.onmouseleave=null;}else if(flagged[idx]){el.classList.add('flagged');el.style.background=T.cellHidden;el.style.border=`1px solid ${T.border}`;el.style.cursor='pointer';el.style.color=T.flagColor;el.style.fontSize=Math.max(8,Math.round(sz*0.5))+'px';el.onmouseenter=null;el.onmouseleave=null;}else{el.style.background=T.cellHidden;el.style.border=`1px solid ${T.border}`;el.style.cursor='pointer';el.onmouseenter=()=>{el.style.background=T.cellHover;hoveredCell=idx;};el.onmouseleave=()=>{el.style.background=T.cellHidden;if(hoveredCell===idx)hoveredCell=null;};}}
function renderGrid(){const g=document.getElementById('grid');g.style.gridTemplateColumns=`repeat(${cols},${cellSize}px)`;g.style.gap='2px';g.innerHTML='';for(let i=0;i<rows*cols;i++){const c=document.createElement('div');styleCell(c,i);c.addEventListener('click',()=>handleClick(i));c.addEventListener('contextmenu',e=>{e.preventDefault();handleFlag(i);});g.appendChild(c);}syncCanvases();}
function getCellEl(idx){return document.getElementById('grid').querySelectorAll('.cell')[idx]||null;}
function getCellCenter(idx){const el=getCellEl(idx);if(!el)return{x:window.innerWidth/2,y:window.innerHeight/2};const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}
function spawnTileFall(idx){const el=getCellEl(idx);if(!el)return;const rect=el.getBoundingClientRect();const T=THEMES[curTheme];const dir=Math.random()<0.5?-1:1;tileParticles.push({x:rect.left,y:rect.top,w:rect.width,h:rect.height,vx:dir*(0.8+Math.random()*1.2),vy:0.4+Math.random()*0.6,rot:0,rotV:dir*(0.02+Math.random()*0.03),life:1,decay:1/120,color:T.cellHidden,borderColor:T.border});if(!tileAnimId)startTileLoop();}
function startTileLoop(){function loop(){tileCtx.clearRect(0,0,tileCanvas.width,tileCanvas.height);tileParticles=tileParticles.filter(p=>p.life>0);tileParticles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.rot+=p.rotV;p.life-=p.decay;tileCtx.save();tileCtx.globalAlpha=Math.max(0,p.life);tileCtx.translate(p.x+p.w/2,p.y+p.h/2);tileCtx.rotate(p.rot);tileCtx.fillStyle=p.color;tileCtx.strokeStyle=p.borderColor;tileCtx.lineWidth=1;tileCtx.beginPath();tileCtx.roundRect(-p.w/2,-p.h/2,p.w,p.h,3);tileCtx.fill();tileCtx.stroke();tileCtx.restore();});if(tileParticles.length>0){tileAnimId=requestAnimationFrame(loop);}else{tileAnimId=null;tileCtx.clearRect(0,0,tileCanvas.width,tileCanvas.height);}}tileAnimId=requestAnimationFrame(loop);}
function revealBFS(startIdx){const queue=[startIdx],visited=new Set([startIdx]),order=[];while(queue.length){const cur=queue.shift();order.push(cur);if(board[cur]===0){neighbors(cur).forEach(j=>{if(!visited.has(j)&&!revealed[j]&&!flagged[j]&&board[j]!==9){visited.add(j);queue.push(j);}});}}order.forEach(i=>{revealed[i]=true;});order.forEach((idx,i)=>{setTimeout(()=>{spawnTileFall(idx);const el=getCellEl(idx);if(!el)return;styleCell(el,idx);el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');el.addEventListener('animationend',()=>el.classList.remove('pop'),{once:true});},i*20);});return order.length;}
function triggerWinRipple(){const T=THEMES[curTheme];const cells=document.getElementById('grid').querySelectorAll('.cell');const cr=Math.floor(rows/2),cc=Math.floor(cols/2);for(let i=0;i<rows*cols;i++){const r=Math.floor(i/cols),c=i%cols,dist=Math.sqrt((r-cr)**2+(c-cc)**2);setTimeout(()=>{const el=cells[i];if(!el)return;el.classList.remove('win-ripple');void el.offsetWidth;el.classList.add('win-ripple');el.style.borderColor=T.accent;setTimeout(()=>{el.style.borderColor=T.border;el.classList.remove('win-ripple');},350);},dist*55);}}
function handleClick(idx){if(gameState!=='playing'||revealed[idx])return;if(xKeyHeld){handleFlag(idx);return;}if(flagged[idx])return;const T=THEMES[curTheme];const ac=getSfxAC();if(firstClick){firstClick=false;board=generateNoGuessBoard(idx);startTimer();screenShake(6,350);}if(board[idx]===9){if(livesMode&&livesLeft>1){livesLeft--;T.sound(ac,'mine');screenShake(10,400);deadMines.push(idx);revealed[idx]=true;const el=getCellEl(idx);if(el)styleCell(el,idx);const pos=getCellCenter(idx);THEMES[curTheme].explode(pos.x,pos.y);updateHeartsDisplay();return;}gameState='lost';clearInterval(timerInt);clearInterval(tbInterval);tbInterval=null;document.getElementById('reset-btn').textContent='✕';T.sound(ac,'mine');screenShake(14,500);triggerChainExplosion(idx);showEnd(false);return;}T.sound(ac,'reveal');const count=revealBFS(idx);setTimeout(()=>{if(checkWin()){gameState='won';clearInterval(timerInt);clearInterval(tbInterval);tbInterval=null;document.getElementById('reset-btn').textContent='✓';T.sound(ac,'win');triggerWinRipple();setTimeout(()=>showEnd(true),900);}},count*20+80);}
function handleFlag(idx){if(gameState!=='playing'||revealed[idx])return;flagged[idx]=!flagged[idx];THEMES[curTheme].sound(getSfxAC(),'flag');document.getElementById('mine-count').textContent=mineCount-flagged.filter(Boolean).length;const el=getCellEl(idx);if(el)styleCell(el,idx);}
function triggerChainExplosion(hitIdx){const others=[];for(let i=0;i<rows*cols;i++){if(board[i]===9&&i!==hitIdx&&!deadMines.includes(i))others.push(i);}for(let i=others.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[others[i],others[j]]=[others[j],others[i]];}const seq=hitIdx===-1?[...others]:[hitIdx,...others];const ef=THEMES[curTheme].explode;seq.forEach((idx,order)=>{const delay=order===0?0:100+(order-1)*100+Math.random()*60-30;const t=setTimeout(()=>{revealed[idx]=true;const el=getCellEl(idx);if(el)styleCell(el,idx);const pos=getCellCenter(idx);ef(pos.x,pos.y);},delay);chainTimeouts.push(t);});}
function checkWin(){for(let i=0;i<rows*cols;i++){if(board[i]!==9&&!revealed[i])return false;}return true;}
function startTimer(){timerInt=setInterval(()=>{seconds++;document.getElementById('timer').textContent=String(Math.min(seconds,999)).padStart(3,'0');},1000);if(curMode==='timebomb'){tbRemaining=tbSeconds;tbInterval=setInterval(()=>{tbRemaining--;updateTBDisplay();if(tbRemaining<=0){clearInterval(tbInterval);tbInterval=null;if(gameState==='playing'){gameState='lost';clearInterval(timerInt);document.getElementById('reset-btn').textContent='✕';THEMES[curTheme].sound(getSfxAC(),'mine');screenShake(14,500);triggerChainExplosion(-1);showEnd(false,'time ran out');}}},1000);}}
function showEnd(win,msg){const T=THEMES[curTheme];const subMsg=msg||(win?`cleared in ${seconds}s`:'you hit a mine');document.getElementById('end-area').innerHTML=`<div class="end-overlay"><div class="end-box" style="background:${T.panel};border-color:${win?T.accent:T.accent2}"><h2 style="color:${win?T.accent:T.accent2};font-family:${T.titleFont}">${win?'CLEARED':'DETONATED'}</h2><p style="color:${T.text}">${subMsg}</p><button style="color:${win?T.accent:T.accent2};font-family:${T.font}" onclick="newGame()">play again</button></div></div>`;}
function startExLoop(){if(exAnimId)return;function loop(){exCtx.clearRect(0,0,exCanvas.width,exCanvas.height);exParticles=exParticles.filter(p=>p.life>0);exParticles.forEach(p=>{p.update();p.draw(exCtx);});if(exParticles.length>0){exAnimId=requestAnimationFrame(loop);}else{exAnimId=null;exCtx.clearRect(0,0,exCanvas.width,exCanvas.height);}}exAnimId=requestAnimationFrame(loop);}

// ── BG ANIMATIONS ─────────────────────────────────────────────────────────────
function startBgAnim(){
  if(bgAnimId){cancelAnimationFrame(bgAnimId);bgAnimId=null;}
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);bgParticles=[];
  const type=THEMES[curTheme].bgAnim;
  function W(){return bgCanvas.width;}function H(){return bgCanvas.height;}

  if(type==='cyber'){
    for(let i=0;i<60;i++)bgParticles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vy:0.3+Math.random()*0.8,size:Math.random()*2+1,alpha:Math.random()*0.35+0.08,color:Math.random()<0.5?'#00f5ff':'#ff00aa'});
    let scanY=0;
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle=p.color;bgCtx.fillRect(p.x,p.y,p.size,p.size);p.y+=p.vy;if(p.y>H()){p.y=0;p.x=Math.random()*W();}});bgCtx.globalAlpha=0.04;bgCtx.fillStyle='#00f5ff';bgCtx.fillRect(0,scanY,W(),2);scanY=(scanY+1.5)%H();bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='nature'){
    for(let i=0;i<45;i++)bgParticles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*0.35,vy:-(0.2+Math.random()*0.45),size:Math.random()*2.5+0.8,alpha:Math.random()*0.22+0.05,color:Math.random()<0.5?'#88ff44':'#ffcc00'});
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle=p.color;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.fill();p.x+=p.vx;p.y+=p.vy;if(p.y<-p.size){p.y=H()+p.size;p.x=Math.random()*W();}if(p.y>H()+p.size){p.y=-p.size;p.x=Math.random()*W();}if(p.x<-p.size)p.x=W()+p.size;if(p.x>W()+p.size)p.x=-p.size;});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='retro'){
    for(let i=0;i<80;i++)bgParticles.push({x:Math.floor(Math.random()*window.innerWidth),y:Math.floor(Math.random()*window.innerHeight),life:Math.random()*40,maxLife:30+Math.random()*40,color:'#ff8800'});
    let offset=0;
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgCtx.globalAlpha=0.055;bgCtx.fillStyle='#ff8800';for(let y=(offset|0)%4;y<H();y+=4)bgCtx.fillRect(0,y,W(),1);offset+=0.5;bgParticles.forEach(p=>{p.life--;if(p.life<0){p.life=p.maxLife;p.x=Math.floor(Math.random()*W());p.y=Math.floor(Math.random()*H());}bgCtx.globalAlpha=Math.max(0,(p.life/p.maxLife)*0.22);bgCtx.fillStyle=p.color;bgCtx.fillRect(p.x,p.y,2,2);});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='ice'){
    for(let i=0;i<55;i++)bgParticles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*0.18,vy:0.15+Math.random()*0.38,size:Math.random()*2.2+0.5,alpha:Math.random()*0.28+0.05});
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle='#88ddff';bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.fill();p.x+=p.vx;p.y+=p.vy;if(p.y>H()+p.size){p.y=-p.size;p.x=Math.random()*W();}if(p.x<-p.size)p.x=W()+p.size;if(p.x>W()+p.size)p.x=-p.size;});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='candy'){
    const colors=['#ff44ff','#ff44aa','#aa44ff','#ffdd44','#44ffaa'];
    for(let i=0;i<35;i++)bgParticles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*0.55,vy:(Math.random()-.5)*0.55,size:Math.random()*3.5+1.5,alpha:Math.random()*0.18+0.04,color:colors[Math.floor(Math.random()*colors.length)]});
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle=p.color;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<=p.size||p.x>=W()-p.size)p.vx*=-1;if(p.y<=p.size||p.y>=H()-p.size)p.vy*=-1;});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='space'){
    for(let i=0;i<200;i++)bgParticles.push({type:'star',x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,size:Math.random()*1.8+0.2,alpha:Math.random()*0.7+0.3,twinkle:Math.random()*Math.PI*2,twinkleSpeed:0.02+Math.random()*0.04});
    bgParticles.push({type:'shooting',active:false,x:0,y:0,vx:0,vy:0,life:0});
    let st=0;
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{if(p.type==='star'){p.twinkle+=p.twinkleSpeed;bgCtx.globalAlpha=p.alpha*(0.7+0.3*Math.sin(p.twinkle));bgCtx.fillStyle='#ffffff';bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.fill();}else{if(!p.active){st++;if(st>300){p.active=true;p.x=Math.random()*W();p.y=Math.random()*(H()*0.4);p.vx=4+Math.random()*4;p.vy=2+Math.random()*2;p.life=1;st=0;}}if(p.active){bgCtx.globalAlpha=p.life*0.8;bgCtx.strokeStyle='#ffffff';bgCtx.lineWidth=1.5;bgCtx.beginPath();bgCtx.moveTo(p.x,p.y);bgCtx.lineTo(p.x-p.vx*8,p.y-p.vy*8);bgCtx.stroke();p.x+=p.vx;p.y+=p.vy;p.life-=0.03;if(p.life<=0||p.x>W()||p.y>H())p.active=false;}}});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='neon_tokyo'){
    const nc=Math.floor(window.innerWidth/18);
    for(let i=0;i<nc;i++)bgParticles.push({x:i*18+Math.random()*10,y:Math.random()*window.innerHeight,speed:1+Math.random()*3,alpha:Math.random()*0.25+0.05,color:Math.random()<0.5?'#ff2266':'#00ffcc'});
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle=p.color;bgCtx.font='12px monospace';bgCtx.fillText('|',p.x,p.y);p.y+=p.speed;if(p.y>H()+20){p.y=-20;p.alpha=Math.random()*0.25+0.05;}});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='synthwave'){
    // ── PROPER SYNTHWAVE SUNSET ──────────────────────────────────────────────
    let go=0;
    // floating star particles above horizon
    for(let i=0;i<30;i++)bgParticles.push({
      x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight*0.55,
      vx:(Math.random()-.5)*0.06,vy:-0.015-Math.random()*0.04,
      size:Math.random()*1.5+0.5,alpha:Math.random()*0.4+0.1,
      color:Math.random()<0.5?'#ff44cc':'#44ddff'
    });
    (function loop(){
      const w=W(),h=H();
      bgCtx.clearRect(0,0,w,h);
      const hz=h*0.58; // horizon y

      // ── sky gradient: deep purple top → orange/pink at horizon ──
      const skyGrad=bgCtx.createLinearGradient(0,0,0,hz);
      skyGrad.addColorStop(0,'#0a0018');
      skyGrad.addColorStop(0.5,'#220033');
      skyGrad.addColorStop(0.8,'#550022');
      skyGrad.addColorStop(1,'#cc3300');
      bgCtx.fillStyle=skyGrad;
      bgCtx.fillRect(0,0,w,hz);

      // ── sun: glowing circle sitting on horizon ──
      const sunX=w/2,sunY=hz,sunR=h*0.09;
      // outer glow layers
      for(let r=sunR*3;r>sunR*0.9;r-=sunR*0.2){
        const alpha=0.04*(1-(r-sunR)/(sunR*2.1));
        bgCtx.globalAlpha=Math.max(0,alpha);
        bgCtx.fillStyle='#ff6600';
        bgCtx.beginPath();bgCtx.arc(sunX,sunY,r,0,Math.PI*2);bgCtx.fill();
      }
      // sun body gradient
      const sunGrad=bgCtx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR);
      sunGrad.addColorStop(0,'#ffffaa');
      sunGrad.addColorStop(0.3,'#ffcc00');
      sunGrad.addColorStop(0.7,'#ff6600');
      sunGrad.addColorStop(1,'#cc2200');
      bgCtx.globalAlpha=0.85;
      bgCtx.fillStyle=sunGrad;
      bgCtx.beginPath();bgCtx.arc(sunX,sunY,sunR,0,Math.PI*2);bgCtx.fill();
      // horizontal scan lines across sun (classic synth look)
      bgCtx.globalAlpha=0.35;
      bgCtx.fillStyle='#0d0018';
      for(let y=sunY-sunR+4;y<sunY+sunR;y+=6){
        const half=Math.sqrt(Math.max(0,sunR*sunR-(y-sunY)**2));
        bgCtx.fillRect(sunX-half,y,half*2,3);
      }

      // ── ground gradient: near-black purple to dark near horizon ──
      const groundGrad=bgCtx.createLinearGradient(0,hz,0,h);
      groundGrad.addColorStop(0,'#1a0033');
      groundGrad.addColorStop(1,'#0a0015');
      bgCtx.globalAlpha=1;
      bgCtx.fillStyle=groundGrad;
      bgCtx.fillRect(0,hz,w,h-hz);

      // ── perspective grid ──
      const vp={x:w/2,y:hz}; // vanishing point at horizon center
      // horizontal lines (scroll forward)
      const numH=14;
      for(let i=0;i<numH;i++){
        const t=((i/numH)+go)%1; // 0=near horizon, 1=bottom screen
        const y=hz+t*(h-hz);
        // perspective alpha: closer = brighter
        const alpha=0.12+t*0.55;
        const lineW=0.8+t*3.5;
        // color shift: magenta near horizon, cyan closer
        const r=Math.round(180+t*75),g2=Math.round(0+t*30),b=Math.round(200+t*55);
        bgCtx.globalAlpha=alpha;
        bgCtx.strokeStyle=`rgb(${r},${g2},${b})`;
        bgCtx.lineWidth=lineW;
        bgCtx.beginPath();bgCtx.moveTo(0,y);bgCtx.lineTo(w,y);bgCtx.stroke();
      }
      // vertical lines converging to vanishing point
      const numV=16;
      for(let i=0;i<=numV;i++){
        const xBottom=w*(i/numV);
        const alpha=0.18+Math.abs(i/numV-0.5)*0.5;
        bgCtx.globalAlpha=alpha;
        bgCtx.strokeStyle='#cc44ff';
        bgCtx.lineWidth=1.2;
        bgCtx.beginPath();bgCtx.moveTo(vp.x,vp.y);bgCtx.lineTo(xBottom,h);bgCtx.stroke();
      }

      // ── hot horizon glow line ──
      bgCtx.globalAlpha=0.7;
      bgCtx.strokeStyle='#ff44cc';
      bgCtx.lineWidth=3;
      bgCtx.shadowColor='#ff44cc';
      bgCtx.beginPath();bgCtx.moveTo(0,hz);bgCtx.lineTo(w,hz);bgCtx.stroke();
      bgCtx.shadowColor='transparent';

      // ── floating star particles above horizon ──
      bgParticles.forEach(p=>{
        bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle=p.color;
        bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.fill();
        p.x+=p.vx;p.y+=p.vy;
        if(p.y<-5){p.y=hz-5;p.x=Math.random()*w;}
        if(p.x<0)p.x=w;if(p.x>w)p.x=0;
      });

      go=(go+0.0018)%1;
      bgCtx.globalAlpha=1;
      bgAnimId=requestAnimationFrame(loop);
    })();
  }
  else if(type==='blood_moon'){
    for(let i=0;i<50;i++)bgParticles.push({type:'drop',x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vy:0.4+Math.random()*1.2,len:8+Math.random()*20,alpha:Math.random()*0.25+0.05});
    bgParticles.push({type:'moon',x:null,y:null,pulse:0});
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{if(p.type==='drop'){bgCtx.globalAlpha=p.alpha;bgCtx.strokeStyle='#aa0000';bgCtx.lineWidth=1.5;bgCtx.beginPath();bgCtx.moveTo(p.x,p.y);bgCtx.lineTo(p.x,p.y+p.len);bgCtx.stroke();p.y+=p.vy;if(p.y>H()+p.len){p.y=-p.len;p.x=Math.random()*W();}}else{if(p.x===null){p.x=W()*0.75;p.y=H()*0.18;}p.pulse+=0.02;const r=60+Math.sin(p.pulse)*4;bgCtx.globalAlpha=0.08;bgCtx.fillStyle='#cc2200';bgCtx.beginPath();bgCtx.arc(p.x,p.y,r+20,0,Math.PI*2);bgCtx.fill();bgCtx.globalAlpha=0.15;bgCtx.fillStyle='#ff4400';bgCtx.beginPath();bgCtx.arc(p.x,p.y,r,0,Math.PI*2);bgCtx.fill();}});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='classic'){
    // scanline grid like old windows
    let blink=0;
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgCtx.globalAlpha=0.06;bgCtx.fillStyle='#808080';for(let y=0;y<H();y+=4)bgCtx.fillRect(0,y,W(),1);bgCtx.globalAlpha=0.04;bgCtx.fillStyle='#000000';for(let x=0;x<W();x+=4)bgCtx.fillRect(x,0,1,H());blink++;if(blink%120<2){bgCtx.globalAlpha=0.08;bgCtx.fillStyle='#ffffff';bgCtx.fillRect(Math.random()*W(),Math.random()*H(),2,2);}bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='cherry'){
    const colors=['#ffb3cc','#ff88aa','#ff6688','#ffccdd','#ff99bb'];
    for(let i=0;i<55;i++)bgParticles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight-window.innerHeight,vx:(Math.random()-.5)*0.6,vy:0.4+Math.random()*0.8,rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*0.03,size:3+Math.random()*5,alpha:Math.random()*0.35+0.08,color:colors[~~(Math.random()*colors.length)],wobble:Math.random()*Math.PI*2});
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{p.wobble+=0.02;p.x+=p.vx+Math.sin(p.wobble)*0.4;p.y+=p.vy;p.rot+=p.rotV;bgCtx.globalAlpha=p.alpha;bgCtx.save();bgCtx.translate(p.x,p.y);bgCtx.rotate(p.rot);bgCtx.fillStyle=p.color;bgCtx.beginPath();bgCtx.ellipse(0,0,p.size,p.size*0.6,0,0,Math.PI*2);bgCtx.fill();bgCtx.restore();if(p.y>H()+10){p.y=-10;p.x=Math.random()*W();}});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='moss'){
    for(let i=0;i<40;i++)bgParticles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*0.15,vy:-(0.1+Math.random()*0.25),size:Math.random()*3+1,alpha:Math.random()*0.18+0.04,color:Math.random()<0.6?'#6abf3a':'#a8d878',wobble:Math.random()*Math.PI*2});
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{p.wobble+=0.015;p.x+=p.vx+Math.sin(p.wobble)*0.2;p.y+=p.vy;bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle=p.color;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.fill();if(p.y<-p.size){p.y=H()+p.size;p.x=Math.random()*W();}});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='volcanic'){
    for(let i=0;i<50;i++)bgParticles.push({type:'ember',x:Math.random()*window.innerWidth,y:H()+Math.random()*H(),vx:(Math.random()-.5)*1.2,vy:-(0.8+Math.random()*2.0),life:Math.random(),decay:0.004+Math.random()*0.006,size:Math.random()*3+1,color:Math.random()<0.5?'#ff5500':'#ffaa22'});
    bgParticles.push({type:'lava',offset:0});
    (function loop(){bgCtx.clearRect(0,0,W(),H());const lp=bgParticles.find(p=>p.type==='lava');if(lp){lp.offset+=0.008;const grad=bgCtx.createLinearGradient(0,H()*0.85,0,H());grad.addColorStop(0,'transparent');grad.addColorStop(0.5+0.1*Math.sin(lp.offset),'rgba(180,30,0,0.12)');grad.addColorStop(1,'rgba(255,80,0,0.22)');bgCtx.fillStyle=grad;bgCtx.fillRect(0,H()*0.85,W(),H()*0.15);}bgParticles.forEach(p=>{if(p.type!=='ember')return;p.x+=p.vx;p.y+=p.vy;p.vx*=0.99;p.life-=p.decay;bgCtx.globalAlpha=Math.max(0,p.life*0.6);bgCtx.fillStyle=p.color;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.fill();if(p.life<=0||p.y<-10){p.y=H()+Math.random()*50;p.x=Math.random()*W();p.life=0.6+Math.random()*0.4;p.vy=-(0.8+Math.random()*2.0);p.vx=(Math.random()-.5)*1.2;}});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='sandstone'){
    for(let i=0;i<80;i++)bgParticles.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:0.2+Math.random()*0.5,vy:(Math.random()-.5)*0.1,size:Math.random()*1.5+0.3,alpha:Math.random()*0.15+0.03});
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle='#e8aa44';bgCtx.fillRect(p.x,p.y,p.size,p.size);p.x+=p.vx;p.y+=p.vy;if(p.x>W()+p.size){p.x=-p.size;p.y=Math.random()*H();}});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='aquarium'){
    for(let i=0;i<60;i++)bgParticles.push({type:'bubble',x:Math.random()*window.innerWidth,y:H()+Math.random()*H(),vy:-(0.2+Math.random()*0.6),vx:(Math.random()-.5)*0.3,size:Math.random()*5+1,alpha:Math.random()*0.2+0.03,wobble:Math.random()*Math.PI*2,wobbleSpeed:0.03+Math.random()*0.04});
    for(let i=0;i<6;i++)bgParticles.push({type:'fish',x:Math.random()*window.innerWidth,y:50+Math.random()*(window.innerHeight*0.6),vx:(Math.random()<0.5?-1:1)*(0.3+Math.random()*0.6),vy:(Math.random()-.5)*0.15,wave:Math.random()*Math.PI*2,alpha:0.06+Math.random()*0.06});
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{if(p.type==='bubble'){p.wobble+=p.wobbleSpeed;p.x+=Math.sin(p.wobble)*0.5+p.vx;p.y+=p.vy;bgCtx.globalAlpha=p.alpha;bgCtx.strokeStyle='#44ffcc';bgCtx.lineWidth=1;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.stroke();if(p.y<-p.size){p.y=H()+p.size;p.x=Math.random()*W();}}else{p.wave+=0.05;p.x+=p.vx;p.y+=p.vy+Math.sin(p.wave)*0.2;bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle='#00ccff';bgCtx.save();bgCtx.translate(p.x,p.y);if(p.vx<0)bgCtx.scale(-1,1);bgCtx.beginPath();bgCtx.ellipse(0,0,14,5,0,0,Math.PI*2);bgCtx.fill();bgCtx.beginPath();bgCtx.moveTo(-14,0);bgCtx.lineTo(-22,-6);bgCtx.lineTo(-22,6);bgCtx.closePath();bgCtx.fill();bgCtx.restore();if(p.x<-30)p.x=W()+30;if(p.x>W()+30)p.x=-30;if(p.y<10)p.vy=Math.abs(p.vy);if(p.y>H()-10)p.vy=-Math.abs(p.vy);}});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
}

function makeBurst(cx,cy,vx,vy,color,size,shape){return{x:cx,y:cy,vx,vy,life:1,decay:1/60,size,color,shape,rot:Math.random()*Math.PI*2,rotS:(Math.random()-.5)*0.12,update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.06;this.vx*=0.97;this.rot+=this.rotS;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life);c.save();c.translate(this.x,this.y);c.rotate(this.rot);c.fillStyle=this.color;if(this.shape==='sq'){c.fillRect(-this.size/2,-this.size/2,this.size,this.size);}else if(this.shape==='line'){c.strokeStyle=this.color;c.lineWidth=1.5;c.beginPath();c.moveTo(0,0);c.lineTo(-this.vx*4,-this.vy*4);c.stroke();}else if(this.shape==='star'){c.beginPath();for(let j=0;j<5;j++){const a=j*Math.PI*2/5-Math.PI/2,ia=a+Math.PI/5;c.lineTo(Math.cos(a)*this.size,Math.sin(a)*this.size);c.lineTo(Math.cos(ia)*this.size*0.4,Math.sin(ia)*this.size*0.4);}c.closePath();c.fill();}else{c.beginPath();c.arc(0,0,this.size,0,Math.PI*2);c.fill();}c.restore();c.globalAlpha=1;}};}
function makeDrift(cx,cy,vx,vy,color,size,shape){return{x:cx,y:cy,vx:vx*0.25,vy:vy*0.25,life:1,decay:1/180,size,color,shape,rot:Math.random()*Math.PI*2,rotS:(Math.random()-.5)*0.04,update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.018;this.vx*=0.995;this.rot+=this.rotS;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life*0.7);c.save();c.translate(this.x,this.y);c.rotate(this.rot);c.fillStyle=this.color;if(this.shape==='sq'){c.fillRect(-this.size/2,-this.size/2,this.size,this.size);}else if(this.shape==='leaf'){c.beginPath();c.ellipse(0,0,this.size,this.size*0.4,0,0,Math.PI*2);c.fill();}else{c.beginPath();c.arc(0,0,this.size,0,Math.PI*2);c.fill();}c.restore();c.globalAlpha=1;}};}
function makeRing(cx,cy,color,dec){return{x:cx,y:cy,radius:0,life:1,decay:dec||1/60,color,update(){this.radius+=6;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life*0.5);c.strokeStyle=this.color;c.lineWidth=2;c.beginPath();c.arc(this.x,this.y,this.radius,0,Math.PI*2);c.stroke();c.globalAlpha=1;}};}
function cyberExplode(cx,cy){const colors=['#00f5ff','#ff00aa','#ffffff','#4444ff','#00ffaa'];for(let i=0;i<55;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*9,color=colors[~~(Math.random()*colors.length)],vx=Math.cos(a)*s,vy=Math.sin(a)*s;exParticles.push(makeBurst(cx,cy,vx,vy,color,Math.random()*4+1,Math.random()<.5?'sq':'line'));if(i<25)exParticles.push(makeDrift(cx,cy,vx,vy,color,Math.random()*3+1,'sq'));}for(let r=0;r<3;r++)exParticles.push(makeRing(cx,cy,['#00f5ff','#ff00aa','#4444ff'][r]));startExLoop();}
function natureExplode(cx,cy){const lc=['#44ff44','#88cc00','#ffcc00','#ff8800','#55cc22'];for(let i=0;i<50;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*7,color=lc[~~(Math.random()*lc.length)],vx=Math.cos(a)*s,vy=Math.sin(a)*s-2;exParticles.push(makeBurst(cx,cy,vx,vy,color,Math.random()*7+3,'leaf'));if(i<25)exParticles.push(makeDrift(cx,cy,vx,vy,color,Math.random()*6+2,'leaf'));}startExLoop();}
function retroExplode(cx,cy){const chars='!@#$%&*X+'.split(''),colors=['#ff8800','#ffdd00','#ff4400','#ffffff'];for(let i=0;i<45;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*8,color=colors[~~(Math.random()*colors.length)],char=chars[~~(Math.random()*chars.length)],sz=~~(Math.random()*3)*6+10,vx=Math.cos(a)*s,vy=Math.sin(a)*s;exParticles.push({x:cx,y:cy,vx,vy,life:1,decay:1/60,color,char,sz,update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.1;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life);c.fillStyle=this.color;c.font=`bold ${this.sz}px 'VT323',monospace`;c.fillText(this.char,this.x,this.y);c.globalAlpha=1;}});if(i<20)exParticles.push(makeDrift(cx,cy,vx,vy,color,Math.random()*3+1,'sq'));}for(let r=0;r<3;r++){setTimeout(()=>{exParticles.push({x:cx,y:cy,life:1,decay:1/60,s:0,r,update(){this.s+=5;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life);c.strokeStyle=this.r%2===0?'#ff8800':'#ffdd00';c.lineWidth=3;c.strokeRect(cx-this.s/2,cy-this.s/2,this.s,this.s);c.globalAlpha=1;}});},r*50);}startExLoop();}
function iceExplode(cx,cy){for(let i=0;i<12;i++){const angle=(i/12)*Math.PI*2,len=40+Math.random()*50,branches=~~(Math.random()*3)+2;exParticles.push({x:cx,y:cy,angle,len,branches,life:1,decay:1/60,grow:0,update(){this.grow=Math.min(1,this.grow+0.07);this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life);c.strokeStyle='#88ddff';c.lineWidth=1.5;const ex=cx+Math.cos(this.angle)*this.len*this.grow,ey=cy+Math.sin(this.angle)*this.len*this.grow;c.beginPath();c.moveTo(cx,cy);c.lineTo(ex,ey);c.stroke();for(let b=0;b<this.branches;b++){const t=(b+1)/(this.branches+1),bx=cx+Math.cos(this.angle)*this.len*this.grow*t,by=cy+Math.sin(this.angle)*this.len*this.grow*t,bl=this.len*0.35*this.grow;c.beginPath();c.moveTo(bx,by);c.lineTo(bx+Math.cos(this.angle+Math.PI/3)*bl,by+Math.sin(this.angle+Math.PI/3)*bl);c.stroke();c.beginPath();c.moveTo(bx,by);c.lineTo(bx+Math.cos(this.angle-Math.PI/3)*bl,by+Math.sin(this.angle-Math.PI/3)*bl);c.stroke();}c.globalAlpha=1;}});}const ic=['#88ddff','#aaeeff','#cceeff','#ffffff','#44aaff'];for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*8,color=ic[~~(Math.random()*ic.length)],vx=Math.cos(a)*s,vy=Math.sin(a)*s;exParticles.push(makeBurst(cx,cy,vx,vy,color,Math.random()*5+2,'circle'));if(i<22)exParticles.push(makeDrift(cx,cy,vx,vy,color,Math.random()*4+1,'circle'));}startExLoop();}
function candyExplode(cx,cy){const cc=['#ff44ff','#ff44aa','#ffaaff','#aa44ff','#ff8844','#44ffaa','#ffdd44'];for(let i=0;i<60;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*10,color=cc[~~(Math.random()*cc.length)],shape=['circle','sq'][~~(Math.random()*2)],vx=Math.cos(a)*s,vy=Math.sin(a)*s;exParticles.push(makeBurst(cx,cy,vx,vy,color,Math.random()*6+2,shape));if(i<30)exParticles.push(makeDrift(cx,cy,vx,vy,color,Math.random()*5+2,shape));}for(let i=0;i<4;i++){setTimeout(()=>{exParticles.push(makeRing(cx,cy,cc[i%cc.length],1/60));},i*60);}startExLoop();}
function spaceExplode(cx,cy){const colors=['#c8aaff','#ffd700','#ffffff','#88ddff','#ff8888'];for(let i=0;i<70;i++){const a=Math.random()*Math.PI*2,s=4+Math.random()*10,color=colors[~~(Math.random()*colors.length)],vx=Math.cos(a)*s,vy=Math.sin(a)*s;exParticles.push(makeBurst(cx,cy,vx,vy,color,Math.random()*4+1,'star'));if(i<35)exParticles.push(makeDrift(cx,cy,vx,vy,color,Math.random()*3+1,'circle'));}for(let r=0;r<5;r++){setTimeout(()=>{exParticles.push(makeRing(cx,cy,['#c8aaff','#ffd700','#88ddff','#ffffff','#aaaaff'][r],1/60));},r*80);}for(let i=0;i<10;i++){const a=Math.random()*Math.PI*2,s=0.5+Math.random()*1.5,color=['#c8aaff','#8866ff','#4444aa'][~~(Math.random()*3)];exParticles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:1/240,size:12+Math.random()*18,color,update(){this.x+=this.vx;this.y+=this.vy;this.vx*=0.99;this.vy*=0.99;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life*0.3);c.fillStyle=this.color;c.beginPath();c.arc(this.x,this.y,this.size,0,Math.PI*2);c.fill();c.globalAlpha=1;}});}startExLoop();}
function neonTokyoExplode(cx,cy){const colors=['#ff2266','#00ffcc','#ffee00','#ff88ff','#ffffff'];for(let i=0;i<50;i++){const a=Math.random()*Math.PI*2,s=4+Math.random()*9,color=colors[~~(Math.random()*colors.length)],vx=Math.cos(a)*s,vy=Math.sin(a)*s;exParticles.push(makeBurst(cx,cy,vx,vy,color,Math.random()*4+1,'line'));if(i<25)exParticles.push(makeDrift(cx,cy,vx,vy,color,Math.random()*3+1,'sq'));}for(let i=0;i<12;i++){const color=colors[~~(Math.random()*colors.length)];exParticles.push({x:cx+(Math.random()-.5)*40,y:cy,vy:-(6+Math.random()*8),vx:(Math.random()-.5)*2,life:1,decay:1/50,color,size:2+Math.random()*3,update(){this.x+=this.vx;this.y+=this.vy;this.vy*=0.95;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life);c.strokeStyle=this.color;c.lineWidth=this.size;c.beginPath();c.moveTo(this.x,this.y);c.lineTo(this.x,this.y+20*this.life);c.stroke();c.globalAlpha=1;}});}for(let r=0;r<3;r++){setTimeout(()=>{exParticles.push(makeRing(cx,cy,['#ff2266','#00ffcc','#ffee00'][r],1/60));},r*60);}startExLoop();}
function synthwaveExplode(cx,cy){const colors=['#ff44cc','#44ddff','#ffee44','#ffffff','#aa44ff'];for(let i=0;i<60;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*9,color=colors[~~(Math.random()*colors.length)],vx=Math.cos(a)*s,vy=Math.sin(a)*s;exParticles.push(makeBurst(cx,cy,vx,vy,color,Math.random()*5+2,'sq'));if(i<30)exParticles.push(makeDrift(cx,cy,vx,vy,color,Math.random()*4+1,'sq'));}for(let r=0;r<4;r++){exParticles.push({x:cx,y:cy,w:0,life:1,decay:1/50,color:['#ff44cc','#44ddff','#ffee44','#aa44ff'][r],update(){this.w+=8;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life*0.5);c.strokeStyle=this.color;c.lineWidth=2;c.strokeRect(cx-this.w/2,cy-this.w/4,this.w,this.w/2);c.globalAlpha=1;}});}for(let r=0;r<5;r++){setTimeout(()=>{exParticles.push(makeRing(cx,cy,colors[r%colors.length],1/60));},r*50);}startExLoop();}

function classicExplode(cx,cy){// chunky pixel-style explosion
  const colors=['#ff0000','#ffff00','#ff8800','#ffffff','#000000'];
  for(let i=0;i<60;i++){const a=Math.random()*Math.PI*2,s=4+Math.random()*10,color=colors[~~(Math.random()*colors.length)],vx=Math.cos(a)*s,vy=Math.sin(a)*s;
  exParticles.push({x:cx,y:cy,vx,vy,life:1,decay:1/50,color,size:~~(Math.random()*3+1)*4,update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.2;this.vx*=0.95;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life);c.fillStyle=this.color;c.fillRect(~~(this.x-this.size/2),~~(this.y-this.size/2),this.size,this.size);c.globalAlpha=1;}});}
  for(let r=0;r<4;r++){const sz=r*14+8;exParticles.push({x:cx,y:cy,life:1,decay:1/40,sz,update(){this.sz+=6;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life);c.strokeStyle=r%2===0?'#ff0000':'#ffff00';c.lineWidth=3;c.strokeRect(cx-this.sz/2,cy-this.sz/2,this.sz,this.sz);c.globalAlpha=1;}});}
  startExLoop();}
