 
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600&family=Cinzel:wght@600&family=VT323&family=Orbitron:wght@700&family=Permanent+Marker&family=Audiowide&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;flex-direction:column;align-items:center;padding:12px 8px;min-height:100vh;transition:background .4s;overflow:hidden}
#bg-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:0}
#explosion-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:999}
#tile-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:10}
#game-root{width:100%;max-width:100%;position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
.theme-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:8px;width:100%;max-width:620px}
.tbtn{padding:4px 3px;border:1px solid #444;background:transparent;color:#888;font-size:9px;cursor:pointer;border-radius:4px;transition:all .2s;letter-spacing:1px;font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.diff-row{display:flex;gap:5px;margin-bottom:8px;width:100%;max-width:620px}
.dbtn{flex:1;padding:4px 5px;border:1px solid #333;background:transparent;color:#666;font-family:monospace;font-size:10px;cursor:pointer;border-radius:4px}
.panel{border:1px solid #333;border-radius:8px;padding:8px 14px;margin-bottom:8px;display:flex;align-items:center;gap:16px;width:100%;max-width:620px}
.stat{display:flex;flex-direction:column;align-items:center;min-width:48px}
.stat-label{font-size:10px;letter-spacing:2px}
.stat-val{font-size:20px;font-weight:700}
.reset-btn{flex:1;padding:6px;border:1px solid #555;background:transparent;font-size:18px;cursor:pointer;border-radius:6px}
#music-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:5px 10px;border:1px solid #333;border-radius:6px;width:100%;max-width:620px}
#music-btn{padding:3px 10px;border:1px solid #555;background:transparent;font-size:11px;cursor:pointer;border-radius:4px;letter-spacing:1px;font-family:monospace;white-space:nowrap}
#music-label{font-size:10px;letter-spacing:2px;flex:1;text-align:center}
#vol-slider{width:60px;accent-color:#888}
#grid-wrap{width:100%;display:flex;justify-content:center;align-items:center}
#grid{display:grid;margin:0 auto;cursor:default}
.cell{border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;user-select:none;transition:transform .08s}
.cell:hover:not(.revealed):not(.flagged){transform:scale(1.08)}
.cell.revealed{cursor:default}
.cell.flagged::after{content:'!';font-weight:900}
.cell.mine-show::after{content:'*';font-weight:900}
@keyframes cellPop{0%{transform:scale(1)}35%{transform:scale(1.2)}65%{transform:scale(0.93)}100%{transform:scale(1)}}
@keyframes cellRippleAnim{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
.cell.pop{animation:cellPop .2s ease-out forwards}
.cell.win-ripple{animation:cellRippleAnim .28s ease-out forwards}
#end-area{width:100%;max-width:620px}
.end-overlay{display:flex;min-height:200px;align-items:center;justify-content:center;margin-top:8px}
.end-box{border:1px solid #555;border-radius:12px;padding:22px 32px;text-align:center}
.end-box h2{font-size:26px;letter-spacing:4px;margin-bottom:6px}
.end-box p{font-size:12px;margin-bottom:14px}
.end-box button{padding:8px 22px;background:transparent;border:1px solid currentColor;font-size:12px;cursor:pointer;border-radius:6px;letter-spacing:2px;font-family:monospace}
.mode-row{display:flex;gap:5px;margin-bottom:8px;width:100%;max-width:620px}
#collapse-btn{width:100%;max-width:620px;background:transparent;border:1px solid #444;border-radius:4px;color:#555;font-size:14px;cursor:pointer;padding:3px 0;margin-bottom:4px}
#collapse-btn:hover{color:#888}
.collapsed #theme-bar,.collapsed #mode-row,.collapsed #timebomb-row,.collapsed #custom-row,.collapsed #diff-row,.collapsed #music-bar,.collapsed #game-title-wrap,.collapsed #stats-bar{display:none!important}
.collapsed #collapse-btn{margin-bottom:0}
.mbtn{flex:1;padding:4px 5px;border:1px solid #333;background:transparent;color:#666;font-family:monospace;font-size:10px;cursor:pointer;border-radius:4px;letter-spacing:1px}
.mbtn.active{font-weight:700}
#timebomb-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:5px 10px;border:1px solid #333;border-radius:6px;width:100%;max-width:620px;display:none}
#timebomb-row span{font-size:10px;letter-spacing:2px;flex:1}
#tb-minus,#tb-plus{width:24px;height:24px;border:1px solid #555;background:transparent;color:#888;font-size:14px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;line-height:1}
#tb-val{font-size:13px;font-weight:700;min-width:38px;text-align:center}
#tb-countdown{font-size:13px;font-weight:700;min-width:48px;text-align:right}
#lives-bar{position:fixed;bottom:12px;right:12px;z-index:20;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
#shortcuts-btn{position:fixed;bottom:12px;left:12px;z-index:20;padding:4px 10px;border:1px solid #444;background:transparent;color:#666;font-size:9px;cursor:pointer;border-radius:4px;font-family:monospace;letter-spacing:1px}
#shortcuts-modal{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;border-radius:10px;padding:22px 28px;min-width:240px}
#shortcuts-modal h3{font-size:13px;letter-spacing:3px;margin-bottom:14px}
#shortcuts-modal .sk{display:flex;justify-content:space-between;gap:24px;margin-bottom:7px;font-size:11px}
#shortcuts-modal .sk span:first-child{opacity:0.6}
#shortcuts-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:998;background:rgba(0,0,0,0.5)}
#stats-bar{display:flex;gap:5px;margin-bottom:8px;width:100%;max-width:620px}
.stat-col{flex:1;border:1px solid #333;border-radius:4px;padding:4px 6px;text-align:center}
.stat-col-label{font-size:8px;letter-spacing:2px;margin-bottom:3px}
.stat-col-best{font-size:10px;font-weight:700;margin-bottom:1px}
.stat-col-wl{font-size:9px;opacity:0.7}
#lives-toggle{padding:4px 10px;border:1px solid #444;background:transparent;color:#666;font-size:9px;cursor:pointer;border-radius:4px;font-family:monospace;letter-spacing:1px}
#hearts-display{font-size:20px;letter-spacing:3px;display:none}
</style>
<canvas id="bg-canvas"></canvas>
<canvas id="explosion-canvas"></canvas>
<canvas id="tile-canvas"></canvas>
<div id="game-root">
  <div id="game-title-wrap" style="text-align:center;margin-bottom:4px">
    <div id="game-title" style="font-size:22px;font-weight:700;letter-spacing:5px"></div>
    <div id="game-sub" style="font-size:10px;letter-spacing:3px;margin-bottom:10px"></div>
  </div>
  <div class="theme-bar" id="theme-bar"></div>
  <div class="mode-row" id="mode-row"></div>
  <div id="timebomb-row">
    <span id="tb-label">⏱ time</span>
    <button id="tb-minus" onclick="adjustTB(-10)">−</button>
    <div id="tb-val">2:00</div>
    <button id="tb-plus" onclick="adjustTB(10)">+</button>
    <div id="tb-countdown"></div>
  </div>
  <div id="custom-row" style="display:none">
    <div id="custom-inner"></div>
  </div>
  <div class="diff-row" id="diff-row"></div>
  <div class="stats-bar" id="stats-bar">
    <div class="stat-col" id="stat-easy"><div class="stat-col-label">easy</div><div class="stat-col-best" id="best-0">--:--</div><div class="stat-col-wl" id="wl-0">0W 0L</div></div>
    <div class="stat-col" id="stat-med"><div class="stat-col-label">med</div><div class="stat-col-best" id="best-1">--:--</div><div class="stat-col-wl" id="wl-1">0W 0L</div></div>
    <div class="stat-col" id="stat-hard"><div class="stat-col-label">hard</div><div class="stat-col-best" id="best-2">--:--</div><div class="stat-col-wl" id="wl-2">0W 0L</div></div>
  </div>
  <div class="panel" id="panel">
    <div class="stat"><div class="stat-label" id="mine-label">mines</div><div class="stat-val" id="mine-count">10</div></div>
    <button class="reset-btn" id="reset-btn" onclick="newGame()">◉</button>
    <div class="stat"><div class="stat-label" id="time-label">time</div><div class="stat-val" id="timer">000</div></div>
  </div>
  <div id="music-bar">
    <button id="music-btn" onclick="toggleMusic()">▶ music</button>
    <span id="music-label">♩ no track</span>
    <input id="vol-slider" type="range" min="0" max="100" value="40" step="1" oninput="setMusicVol(this.value)">
  </div>
  <button id="collapse-btn" onclick="toggleCollapse()">▲</button>
  <div id="grid-wrap"><div id="grid"></div></div>
  <div id="end-area"></div>
</div>
<button id="shortcuts-btn" onclick="toggleShortcuts()">⌨ shortcuts</button>
<div id="shortcuts-overlay" onclick="toggleShortcuts()"></div>
<div id="shortcuts-modal">
  <h3>SHORTCUTS</h3>
  <div class="sk"><span>reset game</span><span>R</span></div>
  <div class="sk"><span>easy difficulty</span><span>1</span></div>
  <div class="sk"><span>medium difficulty</span><span>2</span></div>
  <div class="sk"><span>hard difficulty</span><span>3</span></div>
  <div class="sk"><span>toggle music</span><span>M</span></div>
  <div class="sk"><span>flag hovered cell</span><span>X</span></div>
  <div class="sk"><span>collapse menu</span><span>C</span></div>
</div>
<div id="lives-bar">
  <div id="hearts-display"></div>
  <button id="lives-toggle" onclick="toggleLives()">♥ lives off</button>
</div>

function startBgAnim(){

  }

    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle='#88ddff';bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.fill();p.x+=p.vx;p.y+=p.vy;if(p.y>H()+p.size){p.y=-p.size;p.x=Math.random()*W();}if(p.x<-p.size)p.x=W()+p.size;if(p.x>W()+p.size)p.x=-p.size;});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();
  }
  else if(type==='space'){

  else if(type==='synthwave'){

    // floating star particles above horizon

      // horizontal scan lines across sun (classic synth look)

      bgCtx.fillStyle='#0d0018';
      for(let y=sunY-sunR+4;y<sunY+sunR;y+=6){

    const grad=bgCtx.createRadialGradient(cx,by,0,cx,by+bh*0.5,bh);grad.addColorStop(0,b.color+'0.06)');grad.addColorStop(0.4,b.color+'0.04)');grad.addColorStop(1,b.color+'0)');

  else if(type==='crystal'){
    const W2=()=>bgCanvas.width,H2=()=>bgCanvas.height;
    // Draw a crystal prism: a hexagonal column shape with a pointed cap
    // tilt: angle from vertical in radians, negative = lean left, positive = lean right
    function drawCrystal(ctx, bx, by, h, w, tilt, hue, alpha){
      const cos=Math.cos(tilt), sin=Math.sin(tilt);
      // Rotate point around base center
      function rot(dx,dy){return{x:bx+dx*cos-dy*sin, y:by+dx*sin+dy*cos};}
      // Crystal shape (in local space, base at 0,0, growing upward = negative y):
      // Base: flat bottom across full width
      // Body: rectangular column up to 75% height, full width
      // Shoulders: steps in to ~60% at 75%
      // Cap: pointed top, comes to a single point at full height
      const hw=w/2, sw=w*0.30, capH=h*0.28;
      const bodyTop=-(h-capH);
      const pts={
        // base
        bl:rot(-hw,0), br:rot(hw,0),
        // body top (shoulder) — narrower than base for column taper
        sl:rot(-hw*0.93,bodyTop), sr:rot(hw,bodyTop),
        // inner shoulder step (creates the facet)
        il:rot(-sw*1.55,bodyTop), ir:rot(sw,bodyTop),
        // tip
        tip:rot(0,-h),
      };
      // Left face (dark)
      ctx.globalAlpha=alpha*0.75;
      ctx.fillStyle=`hsl(${hue},55%,30%)`;
      ctx.beginPath();
      ctx.moveTo(pts.bl.x,pts.bl.y);ctx.lineTo(pts.sl.x,pts.sl.y);
      ctx.lineTo(pts.il.x,pts.il.y);ctx.lineTo(pts.tip.x,pts.tip.y);
      ctx.lineTo(pts.ir.x,pts.ir.y);ctx.lineTo(pts.sr.x,pts.sr.y);
      ctx.lineTo(pts.br.x,pts.br.y);ctx.closePath();ctx.fill();
      // Center face (medium bright)
      ctx.globalAlpha=alpha*0.90;
      ctx.fillStyle=`hsl(${(hue+50)%360},65%,52%)`;
      ctx.beginPath();
      ctx.moveTo(pts.il.x,pts.il.y);ctx.lineTo(pts.tip.x,pts.tip.y);
      ctx.lineTo(pts.ir.x,pts.ir.y);
      // body center panel
      ctx.lineTo(pts.sr.x,pts.sr.y);ctx.lineTo(pts.sl.x,pts.sl.y);
      ctx.closePath();ctx.fill();
      // Right face (bright highlight)
      ctx.globalAlpha=alpha*0.85;
      ctx.fillStyle=`hsl(${(hue+110)%360},70%,65%)`;
      ctx.beginPath();
      ctx.moveTo(pts.ir.x,pts.ir.y);ctx.lineTo(pts.tip.x,pts.tip.y);
      ctx.lineTo(pts.sr.x,pts.sr.y);ctx.lineTo(pts.br.x,pts.br.y);
      ctx.closePath();ctx.fill();
      // Outline
      ctx.globalAlpha=alpha*0.55;
      ctx.strokeStyle=`hsl(${(hue+200)%360},50%,25%)`;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(pts.bl.x,pts.bl.y);ctx.lineTo(pts.sl.x,pts.sl.y);
      ctx.lineTo(pts.il.x,pts.il.y);ctx.lineTo(pts.tip.x,pts.tip.y);
      ctx.lineTo(pts.ir.x,pts.ir.y);ctx.lineTo(pts.sr.x,pts.sr.y);
      ctx.lineTo(pts.br.x,pts.br.y);ctx.closePath();ctx.stroke();
      // Inner facet lines
      ctx.globalAlpha=alpha*0.30;
      ctx.beginPath();ctx.moveTo(pts.il.x,pts.il.y);ctx.lineTo(pts.sl.x,pts.sl.y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(pts.ir.x,pts.ir.y);ctx.lineTo(pts.sr.x,pts.sr.y);ctx.stroke();
      ctx.globalAlpha=1;
    }
    const W0=window.innerWidth,H0=window.innerHeight;
    const BY=H0+28; // sink formations below screen edge
    // Define clusters — each cluster has a base X position
    // Each crystal in a cluster: [offsetX, height, width, tilt_deg]
    const clusterDefs=[
      // left cluster
      {cx:W0*0.15, crystals:[
        {ox:-30,h:160,w:70,tilt:-18,hueOff:0},
        {ox:10, h:220,w:85,tilt:-5, hueOff:40},
        {ox:50, h:140,w:55,tilt:12, hueOff:80},
        {ox:-10,h:90, w:40,tilt:-25,hueOff:20},
      ]},
      // center cluster
      {cx:W0*0.50, crystals:[
        {ox:-45,h:180,w:80,tilt:-15,hueOff:120},
        {ox:5,  h:260,w:95,tilt:0,  hueOff:160},
        {ox:55, h:200,w:75,tilt:14, hueOff:200},
        {ox:-15,h:110,w:45,tilt:-22,hueOff:140},
        {ox:30, h:100,w:42,tilt:20, hueOff:180},
      ]},
      // right cluster
      {cx:W0*0.83, crystals:[
        {ox:-35,h:150,w:65,tilt:-12,hueOff:240},
        {ox:10, h:210,w:80,tilt:3,  hueOff:280},
        {ox:50, h:130,w:52,tilt:18, hueOff:320},
        {ox:-5, h:85, w:38,tilt:-20,hueOff:260},
      ]},
    ];
    // Scale down if screen is small
    const scale=Math.min(1,H0/700);
    const clusters=clusterDefs.map(cl=>({
      cx:cl.cx,
      crystals:cl.crystals.map(c=>({
        ...c,
        h:c.h*scale, w:c.w*scale,
        tilt:c.tilt*Math.PI/180,
      }))
    }));
    // Build list of crystal tip positions for white glints
    const crystalTips=[];
    clusters.forEach(cl=>{
      cl.crystals.forEach(c=>{
        // tip = base rotated by tilt, offset by ox, rising h upward
        const tx=cl.cx+c.ox + Math.sin(-c.tilt)*c.h;
        const ty=BY - Math.cos(c.tilt)*c.h;
        crystalTips.push({x:tx,y:ty});
      });
    });
    // Seed white crystal glints — appear near tip positions
    const crystalGlints=[];
    for(let i=0;i<12;i++){
      const tip=crystalTips[Math.floor(Math.random()*crystalTips.length)];
      crystalGlints.push({x:tip.x+(Math.random()-.5)*30,y:tip.y+(Math.random()-.5)*30,life:Math.random(),decay:0.006+Math.random()*0.01,size:3+Math.random()*6,tipIdx:Math.floor(Math.random()*crystalTips.length)});
    }
    let hueShift=0;
    for(let i=0;i<18;i++)bgParticles.push({type:'glint',x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight*0.85,life:Math.random(),decay:0.008+Math.random()*0.012,hue:Math.random()*360,size:4+Math.random()*8});
    (function loop(){
      bgCtx.clearRect(0,0,W2(),H2());
      hueShift=(hueShift+0.10)%360;
      clusters.forEach(cl=>{
        // Sort: draw most-tilted (outer) first so center ones appear on top
        const sorted=[...cl.crystals].sort((a,b)=>b.h-a.h);
        sorted.forEach(c=>{
          const hue=(c.hueOff+hueShift)%360;
          drawCrystal(bgCtx, cl.cx+c.ox, BY, c.h, c.w, c.tilt, hue, 0.72);
        });
      });
      // Rainbow glints
      bgParticles.forEach(p=>{
        if(p.type!=='glint')return;
        p.life-=p.decay;
        if(p.life<=0){p.x=Math.random()*W2();p.y=Math.random()*H2()*0.85;p.life=1;p.decay=0.008+Math.random()*0.012;p.hue=Math.random()*360;p.size=4+Math.random()*8;}
        const ga=Math.min(p.life,1-p.life)*2;
        const s=p.size;
        bgCtx.globalAlpha=ga*0.9;
        bgCtx.strokeStyle='hsl('+p.hue+',100%,78%)';
        bgCtx.lineWidth=1.5;
        bgCtx.beginPath();bgCtx.moveTo(p.x,p.y-s);bgCtx.lineTo(p.x,p.y+s);bgCtx.stroke();
        bgCtx.beginPath();bgCtx.moveTo(p.x-s,p.y);bgCtx.lineTo(p.x+s,p.y);bgCtx.stroke();
        bgCtx.beginPath();bgCtx.moveTo(p.x-s*0.4,p.y-s*0.4);bgCtx.lineTo(p.x+s*0.4,p.y+s*0.4);bgCtx.stroke();
        bgCtx.beginPath();bgCtx.moveTo(p.x+s*0.4,p.y-s*0.4);bgCtx.lineTo(p.x-s*0.4,p.y+s*0.4);bgCtx.stroke();
      });
      // White glints on crystal tips
      crystalGlints.forEach(g=>{
        g.life-=g.decay;
        if(g.life<=0){const tip=crystalTips[g.tipIdx];g.x=tip.x+(Math.random()-.5)*25;g.y=tip.y+(Math.random()-.5)*25;g.life=1;g.decay=0.006+Math.random()*0.01;g.size=3+Math.random()*6;g.tipIdx=Math.floor(Math.random()*crystalTips.length);}
        const ga=Math.min(g.life,1-g.life)*2;
        const s=g.size;
        bgCtx.globalAlpha=ga*0.95;
        bgCtx.strokeStyle='rgba(255,255,255,0.95)';
        bgCtx.lineWidth=1.2;
        bgCtx.beginPath();bgCtx.moveTo(g.x,g.y-s);bgCtx.lineTo(g.x,g.y+s);bgCtx.stroke();
        bgCtx.beginPath();bgCtx.moveTo(g.x-s,g.y);bgCtx.lineTo(g.x+s,g.y);bgCtx.stroke();
        bgCtx.beginPath();bgCtx.moveTo(g.x-s*0.4,g.y-s*0.4);bgCtx.lineTo(g.x+s*0.4,g.y+s*0.4);bgCtx.stroke();
        bgCtx.beginPath();bgCtx.moveTo(g.x+s*0.4,g.y-s*0.4);bgCtx.lineTo(g.x-s*0.4,g.y+s*0.4);bgCtx.stroke();
      });
      bgCtx.globalAlpha=1;
      bgAnimId=requestAnimationFrame(loop);
    })();
  }
    else if(type==='aquarium'){
    for(let i=0;i<60;i++)bgParticles.push({type:'bubble',x:Math.random()*window.innerWidth,y:H()+Math.random()*H(),vy:-(0.2+Math.random()*0.6),vx:(Math.random()-.5)*0.3,size:Math.random()*5+1,alpha:Math.random()*0.2+0.03,wobble:Math.random()*Math.PI*2,wobbleSpeed:0.03+Math.random()*0.04});
    for(let i=0;i<6;i++)bgParticles.push({type:'fish',x:Math.random()*window.innerWidth,y:50+Math.random()*(window.innerHeight*0.6),vx:(Math.random()<0.5?-1:1)*(0.3+Math.random()*0.6),vy:(Math.random()-.5)*0.15,wave:Math.random()*Math.PI*2,alpha:0.06+Math.random()*0.06});
    (function loop(){bgCtx.clearRect(0,0,W(),H());bgParticles.forEach(p=>{if(p.type==='bubble'){p.wobble+=p.wobbleSpeed;p.x+=Math.sin(p.wobble)*0.5+p.vx;p.y+=p.vy;bgCtx.globalAlpha=p.alpha;bgCtx.strokeStyle='#44ffcc';bgCtx.lineWidth=1;bgCtx.beginPath();bgCtx.arc(p.x,p.y,p.size,0,Math.PI*2);bgCtx.stroke();if(p.y<-p.size){p.y=H()+p.size;p.x=Math.random()*W();}}else{p.wave+=0.05;p.x+=p.vx;p.y+=p.vy+Math.sin(p.wave)*0.2;bgCtx.globalAlpha=p.alpha;bgCtx.fillStyle='#00ccff';bgCtx.save();bgCtx.translate(p.x,p.y);if(p.vx<0)bgCtx.scale(-1,1);bgCtx.beginPath();bgCtx.ellipse(0,0,14,5,0,0,Math.PI*2);bgCtx.fill();bgCtx.beginPath();bgCtx.moveTo(-14,0);bgCtx.lineTo(-22,-6);bgCtx.lineTo(-22,6);bgCtx.closePath();bgCtx.fill();bgCtx.restore();if(p.x<-30)p.x=W()+30;if(p.x>W()+30)p.x=-30;if(p.y<10)p.vy=Math.abs(p.vy);if(p.y>H()-10)p.vy=-Math.abs(p.vy);}});bgCtx.globalAlpha=1;bgAnimId=requestAnimationFrame(loop);})();

function makeBurst(cx,cy,vx,vy,color,size,shape){return{x:cx,y:cy,vx,vy,life:1,decay:1/60,size,color,shape,rot:Math.random()*Math.PI*2,rotS:(Math.random()-.5)*0.12,update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.06;this.vx*=0.97;this.rot+=this.rotS;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life);c.save();c.translate(this.x,this.y);c.rotate(this.rot);c.fillStyle=this.color;if(this.shape==='sq'){c.fillRect(-this.size/2,-this.size/2,this.size,this.size);}else if(this.shape==='line'){c.strokeStyle=this.color;c.lineWidth=1.5;c.beginPath();c.moveTo(0,0);c.lineTo(-this.vx*4,-this.vy*4);c.stroke();}else if(this.shape==='star'){c.beginPath();for(let j=0;j<5;j++){const a=j*Math.PI*2/5-Math.PI/2,ia=a+Math.PI/5;c.lineTo(Math.cos(a)*this.size,Math.sin(a)*this.size);c.lineTo(Math.cos(ia)*this.size*0.4,Math.sin(ia)*this.size*0.4);}c.closePath();c.fill();}else{c.beginPath();c.arc(0,0,this.size,0,Math.PI*2);c.fill();}c.restore();c.globalAlpha=1;}};}
function makeDrift(cx,cy,vx,vy,color,size,shape){return{x:cx,y:cy,vx:vx*0.25,vy:vy*0.25,life:1,decay:1/180,size,color,shape,rot:Math.random()*Math.PI*2,rotS:(Math.random()-.5)*0.04,update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.018;this.vx*=0.995;this.rot+=this.rotS;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life*0.7);c.save();c.translate(this.x,this.y);c.rotate(this.rot);c.fillStyle=this.color;if(this.shape==='sq'){c.fillRect(-this.size/2,-this.size/2,this.size,this.size);}else if(this.shape==='leaf'){c.beginPath();c.ellipse(0,0,this.size,this.size*0.4,0,0,Math.PI*2);c.fill();}else{c.beginPath();c.arc(0,0,this.size,0,Math.PI*2);c.fill();}c.restore();c.globalAlpha=1;}};}
function makeRing(cx,cy,color,dec){return{x:cx,y:cy,radius:0,life:1,decay:dec||1/60,color,update(){this.radius+=6;this.life-=this.decay;},draw(c){c.globalAlpha=Math.max(0,this.life*0.5);c.strokeStyle=this.color;c.lineWidth=2;c.beginPath();c.arc(this.x,this.y,this.radius,0,Math.PI*2);c.stroke();c.globalAlpha=1;}};}

function glassExplode(cx,cy){
  const colors=['rgba(0,122,255,0.9)','rgba(255,255,255,0.95)','rgba(52,170,220,0.9)','rgba(88,86,214,0.85)','rgba(52,199,89,0.8)'];
  // glass shards — thin elongated rectangles
  for(let i=0;i<50;i++){const a=Math.random()*Math.PI*2,s=4+Math.random()*10,color=colors[~~(Math.random()*colors.length)],vx=Math.cos(a)*s,vy=Math.sin(a)*s;
    exParticles.push({x:cx,y:cy,vx,vy,life:1,decay:1/65,color,w:1+Math.random()*3,h:5+Math.random()*12,rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*0.18,
    update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.06;this.vx*=0.97;this.rot+=this.rotV;this.life-=this.decay;},
    draw(c){c.globalAlpha=Math.max(0,this.life);c.save();c.translate(this.x,this.y);c.rotate(this.rot);c.fillStyle=this.color;c.fillRect(-this.w/2,-this.h/2,this.w,this.h);c.restore();c.globalAlpha=1;}});}
  // expanding frosted rings
  for(let r=0;r<5;r++){setTimeout(()=>{exParticles.push({x:cx,y:cy,radius:0,life:1,decay:1/55,color:['rgba(0,122,255,0.7)','rgba(255,255,255,0.8)','rgba(52,170,220,0.7)','rgba(88,86,214,0.6)','rgba(52,199,89,0.5)'][r],
    update(){this.radius+=7;this.life-=this.decay;},
    draw(c){c.globalAlpha=Math.max(0,this.life*0.5);c.strokeStyle=this.color;c.lineWidth=2;c.beginPath();c.arc(this.x,this.y,this.radius,0,Math.PI*2);c.stroke();c.globalAlpha=1;}});},r*45);}

        <span style="font-size:9px;letter-spacing:2px;color:${T.accent}">WIDTH</span>
        <button onclick="adjCustom('cols',-1)" style="width:20px;height:20px;border:1px solid ${T.border};background:transparent;color:${T.accent2};cursor:pointer;border-radius:3px;font-size:12px">−</button>
        <input id="cv-cols" type="number" min="5" max="50" value="${customCols}" oninput="setCustomDirect('cols',this.value)" style="width:38px;text-align:center;font-size:12px;font-weight:700;border:1px solid ${T.border};background:transparent;color:${T.accent2};border-radius:3px;padding:2px 3px">
        <button onclick="adjCustom('cols',1)" style="width:20px;height:20px;border:1px solid ${T.border};background:transparent;color:${T.accent2};cursor:pointer;border-radius:3px;font-size:12px">+</button>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <span style="font-size:9px;letter-spacing:2px;color:${T.accent}">HEIGHT</span>
        <button onclick="adjCustom('rows',-1)" style="width:20px;height:20px;border:1px solid ${T.border};background:transparent;color:${T.accent2};cursor:pointer;border-radius:3px;font-size:12px">−</button>
        <input id="cv-rows" type="number" min="5" max="30" value="${customRows}" oninput="setCustomDirect('rows',this.value)" style="width:38px;text-align:center;font-size:12px;font-weight:700;border:1px solid ${T.border};background:transparent;color:${T.accent2};border-radius:3px;padding:2px 3px">
        <button onclick="adjCustom('rows',1)" style="width:20px;height:20px;border:1px solid ${T.border};background:transparent;color:${T.accent2};cursor:pointer;border-radius:3px;font-size:12px">+</button>
      </div>
      <div style="display:flex;align-items:center;gap:5px">
        <span style="font-size:9px;letter-spacing:2px;color:${T.accent}">MINES</span>
        <button onclick="adjCustom('mines',-1)" style="width:20px;height:20px;border:1px solid ${T.border};background:transparent;color:${T.accent2};cursor:pointer;border-radius:3px;font-size:12px">−</button>
        <input id="cv-mines" type="number" min="1" value="${customMines}" oninput="setCustomDirect('mines',this.value)" style="width:42px;text-align:center;font-size:12px;font-weight:700;border:1px solid ${T.border};background:transparent;color:${T.accent2};border-radius:3px;padding:2px 3px">
        <button onclick="adjCustom('mines',1)" style="width:20px;height:20px;border:1px solid ${T.border};background:transparent;color:${T.accent2};cursor:pointer;border-radius:3px;font-size:12px">+</button>
      </div>
      <button onclick="newGame()" style="padding:3px 10px;border:1px solid ${T.accent};background:transparent;color:${T.accent};font-size:9px;cursor:pointer;border-radius:4px;letter-spacing:2px;font-family:${T.font}">APPLY</button>
    </div>`;
}
function adjCustom(field,delta){
  if(field==='cols') customCols=Math.max(5,Math.min(50,customCols+delta));
  else if(field==='rows') customRows=Math.max(5,Math.min(30,customRows+delta));
  else if(field==='mines'){
    const maxM=Math.floor(customCols*customRows*0.85)-1;
    customMines=Math.max(1,Math.min(maxM,customMines+delta));
  }
  const ci=document.getElementById('cv-cols'),ri=document.getElementById('cv-rows'),mi=document.getElementById('cv-mines');
  if(ci)ci.value=customCols;
  if(ri)ri.value=customRows;
  if(mi)mi.value=customMines;
}
function setCustomDirect(field,val){
  const v=parseInt(val);
  if(isNaN(v))return;
  if(field==='cols') customCols=Math.max(5,Math.min(50,v));
  else if(field==='rows') customRows=Math.max(5,Math.min(30,v));
  else if(field==='mines'){
    const maxM=Math.floor(customCols*customRows*0.85)-1;
    customMines=Math.max(1,Math.min(maxM,v));
  }
}
function fmtTB(s){const m=Math.floor(s/60),sec=s%60;return m+':'+(sec<10?'0':'')+sec;}
function updateTBDisplay(){const v=document.getElementById('tb-val');const c=document.getElementById('tb-countdown');if(v)v.textContent=fmtTB(tbSeconds);if(c)c.textContent=curMode==='timebomb'&&!firstClick&&gameState==='playing'?fmtTB(tbRemaining):'';}
function adjustTB(delta){tbSeconds=Math.max(10,Math.min(600,tbSeconds+delta));updateTBDisplay();applyThemeStyles();}
function toggleLives(){livesMode=!livesMode;applyThemeStyles();newGame();}
function updateHeartsDisplay(){const d=document.getElementById('hearts-display');const T=THEMES[curTheme];if(!d)return;if(livesMode&&gameState==='playing'){d.style.display='block';d.style.color=T.accent;d.textContent='♥'.repeat(livesLeft)+'♡'.repeat(Math.max(0,3-livesLeft));}else{d.style.display='none';}}
let menuCollapsed=false;
let savedBoard=null; // for replay same board
 
// ── STATS (localStorage) ──────────────────────────────────────────────────────
function getStats(d){try{return JSON.parse(localStorage.getItem('ms_stats_'+d))||{best:null,w:0,l:0};}catch(e){return{best:null,w:0,l:0};}}
function saveStats(d,s){try{localStorage.setItem('ms_stats_'+d,JSON.stringify(s));}catch(e){}}
function recordWin(d,secs){const s=getStats(d);s.w++;if(s.best===null||secs<s.best)s.best=secs;saveStats(d,s);updateStatsBar();}
function recordLoss(d){const s=getStats(d);s.l++;saveStats(d,s);updateStatsBar();}
function fmtBest(s){if(s===null)return'--:--';const m=Math.floor(s/60),sec=s%60;return m+':'+(sec<10?'0':'')+sec;}
function updateStatsBar(){
  [0,1,2].forEach(i=>{
    const s=getStats(i);
    const b=document.getElementById('best-'+i);
    const w=document.getElementById('wl-'+i);
    if(b)b.textContent=fmtBest(s.best);
    if(w)w.textContent=s.w+'W '+s.l+'L';
  });
}
 
// ── VOLUME PERSISTENCE ────────────────────────────────────────────────────────
function loadVolume(){try{const v=localStorage.getItem('ms_vol');if(v!==null){musicVol.value=parseFloat(v);const sl=document.getElementById('vol-slider');if(sl)sl.value=Math.round(parseFloat(v)*100);if(musicGain)musicGain.gain.value=musicVol.value;}}catch(e){}}
function saveVolume(v){try{localStorage.setItem('ms_vol',v);}catch(e){}}
 
// ── SHORTCUTS MODAL ───────────────────────────────────────────────────────────
function toggleShortcuts(){
  const m=document.getElementById('shortcuts-modal');
  const o=document.getElementById('shortcuts-overlay');
  const open=m.style.display==='block';
  m.style.display=open?'none':'block';
  o.style.display=open?'none':'block';
  if(!open){
    const T=THEMES[curTheme];
    m.style.cssText=`display:block;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;border-radius:10px;padding:22px 28px;min-width:240px;background:${T.panel};border:1px solid ${T.border};font-family:${T.font};color:${T.text}`;
    m.querySelector('h3').style.color=T.accent;
  }
}
function replayBoard(){
  if(!savedBoard)return;
  const D=DIFFS[diff];cols=D.cols;rows=D.rows;mineCount=D.mines;
  clearInterval(timerInt);clearInterval(tbInterval);tbInterval=null;tbRemaining=tbSeconds;seconds=0;
  chainTimeouts.forEach(t=>clearTimeout(t));chainTimeouts=[];
  document.getElementById('timer').textContent='000';
  document.getElementById('mine-count').textContent=mineCount;
  document.getElementById('reset-btn').textContent='◉';
  document.getElementById('end-area').innerHTML='';
  board=[...savedBoard];revealed=Array(rows*cols).fill(false);flagged=Array(rows*cols).fill(false);
  deadMines=[];livesLeft=livesMode?3:null;gameState='playing';firstClick=false;
  exParticles=[];tileParticles=[];
  if(exAnimId){cancelAnimationFrame(exAnimId);exAnimId=null;}
  if(tileAnimId){cancelAnimationFrame(tileAnimId);tileAnimId=null;}
  exCtx.clearRect(0,0,exCanvas.width,exCanvas.height);tileCtx.clearRect(0,0,tileCanvas.width,tileCanvas.height);
  startTimer();updateTBDisplay();updateHeartsDisplay();computeCellSize();renderGrid();
}
function toggleCollapse(){
  menuCollapsed=!menuCollapsed;
  document.getElementById('game-root').classList.toggle('collapsed',menuCollapsed);
  document.getElementById('collapse-btn').textContent=menuCollapsed?'▼':'▲';
  computeCellSize();renderGrid();
}
buildUI();syncCanvases();applyThemeStyles();startBgAnim();newGame();loadVolume();updateStatsBar();
</script>
