<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle</title>
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg:     #121213;
    --border: #3a3a3c;
    --text:   #ffffff;
    --green:  #538d4e;
    --yellow: #b59f3b;
    --dark:   #3a3a3c;
    --ts: 62px;
    --tg: 5px;
    --kh: 58px;
  }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Clear Sans','Helvetica Neue',Arial,sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
 
  header {
    width: 100%;
    max-width: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }
  header h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
 
  /* ── Toasts ── */
  #toasts {
    position: fixed;
    top: 72px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 100;
    pointer-events: none;
  }
  .toast {
    background: #fff;
    color: #121213;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    opacity: 0;
    animation: tIn .15s ease forwards, tOut .3s ease var(--td,1.5s) forwards;
  }
  @keyframes tIn  { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes tOut { from{opacity:1} to{opacity:0} }
 
  /* ── Board ── */
  #board-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 0 12px;
  }
  #board {
    display: grid;
    grid-template-rows: repeat(6, var(--ts));
    grid-template-columns: repeat(5, var(--ts));
    gap: var(--tg);
  }
 
  /* ── Tiles ── */
  .tile {
    width: var(--ts);
    height: var(--ts);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 700;
    text-transform: uppercase;
  }
 
  /* pop on letter type */
  @keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
  .tile.pop { animation: pop .1s ease; }
 
  /* filled border when letter typed but not submitted */
  .tile.filled { border-color: #565758; }
 
  /* 3-D flip reveal */
  @keyframes flip {
    0%  { transform: rotateX(0deg); }
    49% { transform: rotateX(-90deg); }
    50% { transform: rotateX(-90deg); }
    100%{ transform: rotateX(0deg); }
  }
  .tile.flip { animation: flip var(--fd,.5s) ease var(--fd2,0s) forwards; }
 
  /* Color states */
  .tile[data-s="correct"] { background:var(--green);  border-color:var(--green); }
  .tile[data-s="present"] { background:var(--yellow); border-color:var(--yellow);}
  .tile[data-s="absent"]  { background:var(--dark);   border-color:var(--dark);  }
 
  /* invalid word shake */
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%,60% {transform:translateX(-5px)}
    40%,80% {transform:translateX(5px)}
  }
  .tile.shake { animation: shake .45s ease; }
 
  /* win bounce */
  @keyframes bounce {
    0%,100%{transform:translateY(0)}
    40%    {transform:translateY(-28px)}
    70%    {transform:translateY(-12px)}
  }
  .tile.bounce { animation: bounce .65s ease var(--bd,0s); }
 
  /* ── Keyboard ── */
  #keyboard {
    width: 100%;
    max-width: 500px;
    padding: 0 8px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .krow { display:flex; justify-content:center; gap:6px; }
  .key {
    height: var(--kh);
    min-width: 43px; max-width: 43px;
    flex: 1;
    border: none;
    border-radius: 4px;
    background: #818384;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s, color .2s;
  }
  .key.wide { min-width:65px; max-width:65px; font-size:12px; }
  .key:active { filter: brightness(.8); }
  .key[data-s="correct"] { background:var(--green); color:#fff; }
  .key[data-s="present"] { background:var(--yellow); color:#fff; }
  .key[data-s="absent"]  { background:var(--dark); color:#818384; }
 
  /* ── Play Again ── */
  #again {
    display: none;
    margin: 14px 0 0;
    padding: 14px 36px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  #again:hover  { background:#6aaa64; }
  #again:active { transform:scale(.97); }
 
  /* ── Responsive ── */
  @media (max-height:680px) {
    :root { --ts:52px; --kh:50px; }
    header h1 { font-size:22px; }
  }
  @media (max-width:390px) {
    :root { --ts:52px; }
    .key      { min-width:30px; max-width:30px; font-size:11px; }
    .key.wide { min-width:48px; max-width:48px; }
  }
</style>
</head>
<body>
 
<header><h1>Wordle</h1></header>
<div id="toasts"></div>
<div id="board-wrap"><div id="board"></div></div>
<div id="keyboard"></div>
<button id="again">Play Again</button>

];
const WORD_SET = new Set(WORDS);
 
/* ════════════════════════════════════════════════════════
   GAME STATE
   ════════════════════════════════════════════════════════ */
let answer, curRow, curCol, over;
let tiles = [], keyEls = {};
 
function init() {
  answer = WORDS[Math.floor(Math.random() * WORDS.length)];
  curRow = curCol = 0;
  over = false;
  tiles = [];
  keyEls = {};
  buildBoard();
  buildKB();
  document.getElementById('again').style.display = 'none';
}
 
/* ════════════════════════════════════════════════════════
   BUILD BOARD  (6 rows × 5 columns of tile divs)
   ════════════════════════════════════════════════════════ */
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = [];
    for (let c = 0; c < 5; c++) {
      const t = document.createElement('div');
      t.className = 'tile';
      board.appendChild(t);
      row.push(t);
    }
    tiles.push(row);
  }
}
 
/* ════════════════════════════════════════════════════════
   BUILD ON-SCREEN KEYBOARD
   ════════════════════════════════════════════════════════ */
const LAYOUT = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['Enter','z','x','c','v','b','n','m','⌫']
];
 
function buildKB() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  LAYOUT.forEach(row => {
    const div = document.createElement('div');
    div.className = 'krow';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k;
      btn.addEventListener('click', () => press(k));
      if (k.length === 1) keyEls[k] = btn;
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}
 
/* ════════════════════════════════════════════════════════
   INPUT — physical keyboard
   ════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter')                    press('Enter');
  else if (e.key === 'Backspace')           press('⌫');
  else if (/^[a-zA-Z]$/.test(e.key))       press(e.key.toLowerCase());
});
 
/* ════════════════════════════════════════════════════════
   INPUT — core handler
   ════════════════════════════════════════════════════════ */
function press(key) {
  if (over) return;
  if (key === '⌫')      erase();
  else if (key === 'Enter') submit();
  else                  type(key);
}
 
function type(letter) {
  if (curCol >= 5) return;
  const t = tiles[curRow][curCol];
  t.textContent = letter;
  t.classList.add('filled');
  t.classList.remove('pop');
  void t.offsetWidth;   // force reflow to restart animation
  t.classList.add('pop');
  t.addEventListener('animationend', () => t.classList.remove('pop'), { once: true });
  curCol++;
}
 
function erase() {
  if (curCol <= 0) return;
  curCol--;
  const t = tiles[curRow][curCol];
  t.textContent = '';
  t.classList.remove('filled');
}
 
/* ════════════════════════════════════════════════════════
   SUBMIT GUESS
   ════════════════════════════════════════════════════════ */
function submit() {
  if (curCol < 5) { toast('Not enough letters'); shake(curRow); return; }
 
  const guess = tiles[curRow].map(t => t.textContent).join('').toLowerCase();
 
  const result = score(guess, answer);
  const DUR = 500, STAGGER = 300;  // ms
 
  /* Staggered tile flip — colour applied at visual midpoint */
  tiles[curRow].forEach((t, i) => {
    const delay = i * STAGGER;
    t.style.setProperty('--fd',  DUR + 'ms');
    t.style.setProperty('--fd2', delay + 'ms');
    // colour assigned at flip midpoint so it appears with the reveal
    setTimeout(() => { t.dataset.s = result[i]; }, delay + DUR / 2);
    t.classList.remove('flip');
    void t.offsetWidth;
    t.classList.add('flip');
    t.addEventListener('animationend', () => t.classList.remove('flip'), { once: true });
  });
 
  /* After last tile finishes flipping, update KB and check outcome */
  setTimeout(() => {
    colorKeys(guess, result);
    const row = curRow;
    curRow++;
    curCol = 0;
    checkEnd(guess, result, row);
  }, 4 * STAGGER + DUR + 60);
}
 
/* ════════════════════════════════════════════════════════
   SCORING  (duplicate-letter safe)
   Pass 1: mark greens and null them out in both arrays.
   Pass 2: mark yellows using remaining (non-null) letters.
   ════════════════════════════════════════════════════════ */
function score(guess, answer) {
  const res = Array(5).fill('absent');
  const aArr = [...answer], gArr = [...guess];
 
  for (let i = 0; i < 5; i++) {
    if (gArr[i] === aArr[i]) {
      res[i] = 'correct';
      aArr[i] = gArr[i] = null;
    }
  }
  for (let i = 0; i < 5; i++) {
    if (!gArr[i]) continue;
    const j = aArr.indexOf(gArr[i]);
    if (j !== -1) { res[i] = 'present'; aArr[j] = null; }
  }
  return res;
}
 
/* ════════════════════════════════════════════════════════
   KEYBOARD COLOURING  (only upgrade, never downgrade)
   correct > present > absent
   ════════════════════════════════════════════════════════ */
const RANK = { correct: 3, present: 2, absent: 1 };
 
function colorKeys(guess, result) {
  for (let i = 0; i < 5; i++) {
    const el = keyEls[guess[i]];
    if (!el) continue;
    if (!el.dataset.s || RANK[result[i]] > RANK[el.dataset.s]) {
      el.dataset.s = result[i];
    }
  }
}
 
/* ════════════════════════════════════════════════════════
   WIN / LOSE
   ════════════════════════════════════════════════════════ */
const PRAISE = ['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];
 
function checkEnd(guess, result, row) {
  const won = result.every(r => r === 'correct');
  if (won) {
    over = true;
    setTimeout(() => bounce(row), 100);
    setTimeout(() => { toast(PRAISE[Math.min(row, 5)], 2200); showAgain(); }, 500);
  } else if (curRow >= 6) {
    over = true;
    setTimeout(() => { toast(answer.toUpperCase(), 3500); showAgain(); }, 200);
  }
}
 
/* ════════════════════════════════════════════════════════
   ANIMATIONS
   ════════════════════════════════════════════════════════ */
function shake(row) {
  tiles[row].forEach(t => {
    t.classList.remove('shake');
    void t.offsetWidth;
    t.classList.add('shake');
    t.addEventListener('animationend', () => t.classList.remove('shake'), { once: true });
  });
}
 
function bounce(row) {
  tiles[row].forEach((t, i) => {
    t.style.setProperty('--bd', (i * 100) + 'ms');
    t.classList.remove('bounce');
    void t.offsetWidth;
    t.classList.add('bounce');
    t.addEventListener('animationend', () => t.classList.remove('bounce'), { once: true });
  });
}
 
/* ════════════════════════════════════════════════════════
   TOAST  — brief message overlay
   ════════════════════════════════════════════════════════ */
function toast(msg, duration = 1800) {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  el.style.setProperty('--td', (duration / 1000 - 0.3) + 's');
  wrap.appendChild(el);
  setTimeout(() => el.remove(), duration + 100);
}
 
/* ════════════════════════════════════════════════════════
   PLAY AGAIN
   ════════════════════════════════════════════════════════ */
function showAgain() { document.getElementById('again').style.display = 'block'; }
document.getElementById('again').addEventListener('click', init);
 
/* ── GO ── */
init();
</script>
